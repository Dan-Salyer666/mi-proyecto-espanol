<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Práctica de Enlace — Fluidez al Leer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-deep:       #0a1628;
  --bg-card:       #111d35;
  --bg-card-hover: #162544;
  --bg-input:      #0d1a2f;
  --border:        #1e3355;
  --border-focus:  #3b6cb5;
  --text-primary:  #e2e8f0;
  --text-secondary:#8a9bb8;
  --text-muted:    #5a6f8e;
  --accent:        #4a90d9;
  --accent-glow:   rgba(74,144,217,0.15);
  --link-cv:       #4a90d9;   /* consonant+vowel */
  --link-vv:       #f59e0b;   /* sinalefa vowel+vowel */
  --link-cc:       #a78bfa;   /* same consonant merge */
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Outfit',sans-serif;
  background-color:var(--bg-deep);
  color:var(--text-primary);
  min-height:100vh;
  position:relative;
  line-height:1.6;
}
body::before {
  content:'';position:fixed;inset:0;
  background:url('Spain tile pattern.webp') center/cover no-repeat;
  opacity:0.06;pointer-events:none;z-index:0;
}
body::after {
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 0%,rgba(74,144,217,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(99,102,241,0.06) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

.wrap { max-width:820px;margin:0 auto;padding:24px 20px 60px;position:relative;z-index:1; }

/* ── HEADER ── */
.back { display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:0.9rem;margin-bottom:18px; }
.back:hover { color:var(--accent); }
h1 { font-family:'DM Serif Display',serif;font-size:2rem;margin-bottom:6px; }
.subtitle { color:var(--text-secondary);font-size:1rem;margin-bottom:28px; }

/* ── CARDS ── */
.card {
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  padding:24px;margin-bottom:20px;
}
.card h2 { font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:14px; }
.card h3 { font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:10px;color:var(--text-primary); }
.card p { color:var(--text-secondary);font-size:0.95rem;margin-bottom:10px; }

/* ── RULES OVERVIEW ── */
.rule-row { display:flex;align-items:flex-start;gap:12px;margin-bottom:12px; }
.rule-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:6px; }
.rule-label { font-weight:600;font-size:0.95rem; }
.rule-example { color:var(--text-muted);font-size:0.88rem;font-style:italic; }

/* ── SELECTION ── */
.field-label { font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;font-weight:500; }
.btn-row { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px; }
.btn-opt {
  padding:8px 18px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--text-secondary);font-family:'Outfit',sans-serif;
  font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.2s;
}
.btn-opt:hover { border-color:#2a4a75;color:var(--text-primary); }
.btn-opt.active { background:linear-gradient(135deg,#3b6cb5,#4a90d9);color:#fff;border-color:transparent; }
.text-input {
  width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg-input);color:var(--text-primary);font-family:'Outfit',sans-serif;
  font-size:0.95rem;outline:none;
}
.text-input:focus { border-color:var(--border-focus); }
.text-input::placeholder { color:var(--text-muted); }
.text-input:disabled { opacity:0.4; }

.check-row { display:flex;align-items:center;gap:8px;margin-bottom:18px; }
.check-row input { accent-color:var(--accent); }
.check-row label { font-size:0.9rem;color:var(--text-secondary); }

.btn-primary {
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#3b6cb5,#4a90d9);color:#fff;
  font-family:'Outfit',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;
  transition:opacity 0.2s;
}
.btn-primary:hover { opacity:0.9; }
.btn-primary:disabled { opacity:0.5;cursor:not-allowed; }

.btn-ghost {
  padding:10px 22px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--text-secondary);font-family:'Outfit',sans-serif;
  font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.2s;
}
.btn-ghost:hover { border-color:#2a4a75;color:var(--text-primary); }

/* ── PASSWORD INLINE ── */
.pw-row { display:flex;gap:8px;margin-bottom:14px;align-items:center; }
.pw-input {
  flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg-input);color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:0.9rem;outline:none;
}
.pw-input:focus { border-color:var(--border-focus); }
.pw-btn {
  padding:8px 16px;border-radius:8px;border:none;
  background:linear-gradient(135deg,#3b6cb5,#4a90d9);color:#fff;
  font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;
}

/* ── LOADING ── */
.loading { text-align:center;padding:40px 0;color:var(--text-muted); }
.spinner { display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── PASSAGE DISPLAY ── */
.passage-card {
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  padding:28px 24px;margin-bottom:20px;
}

.legend { display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border); }
.legend-item { display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-secondary); }
.legend-swatch { width:20px;height:3px;border-radius:2px; }

.sentence-block { margin-bottom:22px; }
.sentence-text { font-family:'DM Serif Display',serif;font-size:1.15rem;line-height:2;margin-bottom:4px; }
.sentence-text .word { display:inline; }
.sentence-text .link-arc {
  display:inline;font-size:0.75rem;vertical-align:sub;margin:0 -1px;line-height:1;
  font-weight:700;user-select:none;
}

.sentence-controls { display:flex;align-items:center;gap:10px;margin-top:4px; }
.btn-icon {
  width:30px;height:30px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;font-size:0.85rem;
  transition:all 0.2s;
}
.btn-icon:hover { border-color:var(--accent);color:var(--accent); }
.btn-expand {
  font-size:0.8rem;color:var(--text-muted);cursor:pointer;background:none;
  border:none;font-family:'Outfit',sans-serif;padding:2px 6px;border-radius:4px;
}
.btn-expand:hover { color:var(--accent); }

.phonetic-line {
  display:none;padding:8px 14px;margin-top:6px;border-radius:8px;
  background:rgba(74,144,217,0.06);border:1px solid rgba(74,144,217,0.12);
  font-family:'Outfit',sans-serif;font-size:0.9rem;color:var(--text-secondary);
  letter-spacing:0.3px;line-height:1.8;
}
.phonetic-line.open { display:block; }
.phonetic-line .ph-pause { color:var(--text-muted);margin:0 4px;font-weight:700; }
.phonetic-line .ph-link { font-weight:600; }
.phonetic-line .ph-link.cv { color:var(--link-cv); }
.phonetic-line .ph-link.vv { color:var(--link-vv); }
.phonetic-line .ph-link.cc { color:var(--link-cc); }

.bottom-buttons { display:flex;gap:12px;flex-wrap:wrap;margin-top:24px; }

/* ── DIALECT INDICATOR ── */
.dialect-tag {
  display:inline-block;padding:3px 10px;border-radius:6px;font-size:0.78rem;font-weight:500;
  background:rgba(74,144,217,0.08);color:var(--accent);border:1px solid rgba(74,144,217,0.15);
}

.error-msg { color:#f87171;font-size:0.9rem;margin-top:8px; }

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .wrap { padding:16px 14px 40px; }
  h1 { font-size:1.6rem; }
  .sentence-text { font-size:1.05rem; }
  .passage-card { padding:20px 16px; }
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script type="module">
import{html,render,useState,useRef,useCallback}from'https://unpkg.com/htm/preact/standalone.module.js';

/* ═══════════════════════════════════════════
   PASSWORD
   ═══════════════════════════════════════════ */
let sessionPassword = '';

/* ═══════════════════════════════════════════
   DIALECT TOGGLE — read from index.html
   ═══════════════════════════════════════════ */
function getDialect(){
  try{ return localStorage.getItem('spanish_dialect')||'neutral'; }catch(e){ return 'neutral'; }
}

/* ═══════════════════════════════════════════
   ENLACE ANALYSIS ENGINE (client-side)
   ═══════════════════════════════════════════ */
const VOWELS = new Set('aáeéiíoóuúüAÁEÉIÍOÓUÚÜ');
const CONSONANTS_RE = /[bcdfghjklmnñpqrstvwxyz]/i;
const PAUSE_AFTER = /[.,;:!?…—–\-\n]/;

function isVowel(ch){ return VOWELS.has(ch); }
function isConsonant(ch){ return ch && CONSONANTS_RE.test(ch); }
function stripH(ch){ return (ch && ch.toLowerCase()==='h') ? '' : ch; }

function lastSoundChar(word){
  // Return the last phonetically relevant character (skip trailing punctuation)
  for(let i=word.length-1;i>=0;i--){
    const c=word[i];
    if(isVowel(c)||isConsonant(c)) return c;
  }
  return '';
}
function firstSoundChar(word){
  // Return the first phonetically relevant character (h is transparent)
  for(let i=0;i<word.length;i++){
    const c=word[i];
    if(c.toLowerCase()==='h') continue;
    if(isVowel(c)||isConsonant(c)) return c;
  }
  return '';
}

function hasPauseAfter(word){
  // Check if word ends with punctuation that signals a breath pause
  const last = word[word.length-1];
  return PAUSE_AFTER.test(last||'');
}

function detectLink(wordA, wordB){
  // Returns null or {type:'cv'|'vv'|'cc'}
  if(!wordA||!wordB) return null;
  if(hasPauseAfter(wordA)) return null; // pause = no link across boundary

  const endCh = lastSoundChar(wordA);
  const startCh = firstSoundChar(wordB);
  if(!endCh||!startCh) return null;

  const eV = isVowel(endCh), eC = isConsonant(endCh);
  const sV = isVowel(startCh), sC = isConsonant(startCh);

  // Rule 1: consonant + vowel
  if(eC && sV) return {type:'cv'};
  // Rule 2: vowel + vowel (sinalefa) — except stressed á+á causes hiatus
  if(eV && sV){
    // simplified: always link (the á+á hiatus exception is rare enough)
    return {type:'vv'};
  }
  // Rule 3: same consonant + same consonant
  if(eC && sC && endCh.toLowerCase()===startCh.toLowerCase()) return {type:'cc'};

  return null;
}

/* ─── Phonetic representation ─── */
function buildPhonetic(words, links){
  // Build a simplified phonetic-flow string for the sentence
  // links[i] = link between words[i] and words[i+1] or null
  let parts = [];
  for(let i=0;i<words.length;i++){
    // Clean word (strip punctuation for phonetic display)
    let w = words[i].replace(/[.,;:!?¡¿…—–"«»""'']/g,'').toLowerCase();
    if(!w) continue;
    parts.push({text:w, linkAfter:links[i]||null, pauseAfter:hasPauseAfter(words[i])});
  }
  return parts;
}

/* ─── Sentence splitter ─── */
function splitSentences(text){
  // Split on sentence-ending punctuation, keep non-empty
  return text.split(/(?<=[.!?…])\s+/).filter(s=>s.trim());
}

/* ═══════════════════════════════════════════
   TTS
   ═══════════════════════════════════════════ */
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-AR';
  u.rate = 0.85;
  // prefer Latin American voice
  const voices = speechSynthesis.getVoices();
  const pref = voices.find(v=>/es[-_](AR|419|MX|US)/i.test(v.lang))
    || voices.find(v=>/^es/i.test(v.lang));
  if(pref) u.voice = pref;
  speechSynthesis.speak(u);
}
// warm up voices
if(window.speechSynthesis) speechSynthesis.getVoices();

/* ═══════════════════════════════════════════
   API CALL
   ═══════════════════════════════════════════ */
async function generatePassage(pw, level, theme, dialect){
  const dialectInstr = dialect==='rioplatense'
    ? 'Usa español rioplatense argentino con formas de vos e imperativo voseante.'
    : 'Usa español neutro con formas de tú. No uses voseo.';

  const themeInstr = theme.trim()
    ? `Tema del texto: ${theme.trim()}.`
    : 'Elige un tema interesante y variado libremente.';

  const system = `Eres un generador de textos para práctica de lectura en voz alta en español.
Genera un texto de 4-5 párrafos cortos (3-4 oraciones cada uno) al nivel ${level}.
${dialectInstr}
${themeInstr}
El texto debe tener variedad de estructuras que produzcan enlace fonético natural:
- Muchas combinaciones de consonante final + vocal inicial entre palabras
- Sinalefas (vocal final + vocal inicial)
- Consonantes iguales entre palabras
No fuerces estos patrones artificialmente — simplemente escribe de forma natural y fluida.
Devuelve SOLO el texto, sin títulos ni explicaciones.`;

  const res = await fetch('/api/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      password:pw,
      model:'claude-sonnet-4-20250514',
      max_tokens:1200,
      system,
      messages:[{role:'user',content:'Genera el texto ahora.'}]
    })
  });
  if(!res.ok){
    const t = await res.text();
    throw new Error(res.status===401?'Contraseña incorrecta':t);
  }
  const data = await res.json();
  let text = (data.content && data.content[0] && data.content[0].text) || '';
  text = text.replace(/```[a-z]*\n?/g,'').replace(/```/g,'').trim();
  return text;
}

/* ═══════════════════════════════════════════
   COMPONENTS
   ═══════════════════════════════════════════ */
const ARC_CHARS = { cv:'⌢', vv:'⌢', cc:'⌢' };
const LINK_COLORS = { cv:'var(--link-cv)', vv:'var(--link-vv)', cc:'var(--link-cc)' };

function SentenceDisplay({text, index}){
  const [showPhonetic, setShowPhonetic] = useState(false);

  const words = text.split(/\s+/).filter(Boolean);
  const links = [];
  for(let i=0;i<words.length-1;i++){
    links.push(detectLink(words[i],words[i+1]));
  }
  links.push(null); // last word has no link after

  const phonetic = buildPhonetic(words, links);

  // Build inline elements
  const elems = [];
  for(let i=0;i<words.length;i++){
    elems.push(html`<span class="word">${words[i]}</span>`);
    if(links[i]){
      elems.push(html`<span class="link-arc" style="color:${LINK_COLORS[links[i].type]}"> ‿ </span>`);
    } else if(i<words.length-1){
      elems.push(' ');
    }
  }

  // Build phonetic line
  const phElems = [];
  for(let i=0;i<phonetic.length;i++){
    const p = phonetic[i];
    if(p.linkAfter){
      phElems.push(html`<span class="ph-link ${p.linkAfter.type}">${p.text}</span>`);
    } else {
      phElems.push(html`<span>${p.text}</span>`);
    }
    if(p.pauseAfter && i<phonetic.length-1){
      phElems.push(html`<span class="ph-pause">│</span>`);
    } else if(i<phonetic.length-1 && !p.linkAfter){
      phElems.push(' ');
    } else if(p.linkAfter && i<phonetic.length-1){
      phElems.push(html`<span class="ph-link ${p.linkAfter.type}">·</span>`);
    }
  }

  return html`
    <div class="sentence-block">
      <div class="sentence-text">${elems}</div>
      <div class="sentence-controls">
        <button class="btn-icon" onClick=${()=>speak(text)} title="Escuchar">🔊</button>
        <button class="btn-expand" onClick=${()=>setShowPhonetic(!showPhonetic)}>
          ${showPhonetic ? '▾ ocultar flujo fonético' : '▸ ver flujo fonético'}
        </button>
      </div>
      <div class="phonetic-line ${showPhonetic?'open':''}">${phElems}</div>
    </div>
  `;
}

function App(){
  const [screen, setScreen] = useState('select'); // select | loading | passage | pw
  const [level, setLevel] = useState('B2');
  const [theme, setTheme] = useState('');
  const [themeOpen, setThemeOpen] = useState(true);
  const [passageText, setPassageText] = useState('');
  const [error, setError] = useState('');
  const pwRef = useRef(null);

  const dialect = getDialect();

  async function doGenerate(pw){
    setScreen('loading'); setError('');
    try {
      const text = await generatePassage(pw, level, theme, dialect);
      setPassageText(text);
      setScreen('passage');
    } catch(e){
      if(e.message==='Contraseña incorrecta'){
        sessionPassword='';
        setError('Contraseña incorrecta');
        setScreen('pw');
      } else {
        setError(e.message||'Error al generar');
        setScreen('select');
      }
    }
  }

  function handleGenerate(){
    if(!sessionPassword){
      setScreen('pw');
    } else {
      doGenerate(sessionPassword);
    }
  }

  function handlePwSubmit(){
    const pw = pwRef.current?.value?.trim();
    if(!pw) return;
    sessionPassword = pw;
    doGenerate(pw);
  }

  function handleReset(){
    setPassageText('');
    setScreen('select');
  }

  // ── Select Screen ──
  if(screen==='select' || screen==='pw'){
    return html`
      <a class="back" href="index.html">← Inicio</a>
      <h1>Práctica de Enlace</h1>
      <p class="subtitle">Lectura en voz alta con fluidez natural</p>

      <!-- CONCEPT OVERVIEW -->
      <div class="card">
        <h2>¿Qué es el enlace?</h2>
        <p>En español hablado, las palabras no se pronuncian por separado — se encadenan dentro de cada frase, creando un flujo continuo de sonido. Este fenómeno se llama <em>enlace</em> o <em>encadenamiento</em>.</p>
        <p>Hay tres reglas principales:</p>
        <div style="margin-top:14px">
          <div class="rule-row">
            <div class="rule-dot" style="background:var(--link-cv)"></div>
            <div>
              <div class="rule-label">Consonante + Vocal</div>
              <div class="rule-example">La consonante final salta a la siguiente sílaba: "los ojos" → lo-so-jos</div>
            </div>
          </div>
          <div class="rule-row">
            <div class="rule-dot" style="background:var(--link-vv)"></div>
            <div>
              <div class="rule-label">Vocal + Vocal (sinalefa)</div>
              <div class="rule-example">Las vocales se funden en una sola sílaba: "mi amigo" → mia-mi-go</div>
            </div>
          </div>
          <div class="rule-row">
            <div class="rule-dot" style="background:var(--link-cc)"></div>
            <div>
              <div class="rule-label">Consonante + Misma consonante</div>
              <div class="rule-example">Se pronuncia una sola vez: "dos sillas" → do-si-llas</div>
            </div>
          </div>
        </div>
        <p style="margin-top:14px;font-size:0.88rem;color:var(--text-muted)">La H es invisible — nunca bloquea el enlace. Las pausas naturales ocurren en comas, puntos y límites de cláusula.</p>
      </div>

      <!-- SELECTION -->
      <div class="card">
        <h2>Generar texto</h2>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
          <span class="dialect-tag">${dialect==='rioplatense'?'Rioplatense (vos)':'Español neutro (tú)'}</span>
          <span style="font-size:0.78rem;color:var(--text-muted)">— se cambia desde la página principal</span>
        </div>

        <div class="field-label">Nivel</div>
        <div class="btn-row">
          ${['A2','B1','B2','C1'].map(l=>html`
            <button class="btn-opt ${level===l?'active':''}" onClick=${()=>setLevel(l)}>${l}</button>
          `)}
        </div>

        <div class="field-label">Tema</div>
        <div class="check-row">
          <input type="checkbox" id="theme-open" checked=${themeOpen} onChange=${e=>{setThemeOpen(e.target.checked);if(!e.target.checked)setTheme('');}} />
          <label for="theme-open">Elegir tema</label>
        </div>
        <input class="text-input" style="margin-bottom:18px"
          placeholder="Ej: viajes, comida, historia argentina…"
          value=${theme} onInput=${e=>setTheme(e.target.value)}
          disabled=${!themeOpen} />

        ${error && html`<div class="error-msg">${error}</div>`}

        ${screen==='pw' ? html`
          <div style="margin-bottom:14px">
            <div class="field-label">Contraseña</div>
            <div class="pw-row">
              <input class="pw-input" type="password" ref=${pwRef} placeholder="Contraseña"
                onKeyDown=${e=>{if(e.key==='Enter')handlePwSubmit()}} />
              <button class="pw-btn" onClick=${handlePwSubmit}>→</button>
            </div>
          </div>
        ` : html`
          <button class="btn-primary" onClick=${handleGenerate}>Generar texto</button>
        `}
      </div>
    `;
  }

  // ── Loading ──
  if(screen==='loading'){
    return html`
      <a class="back" href="index.html">← Inicio</a>
      <h1>Práctica de Enlace</h1>
      <div class="loading">
        <div class="spinner"></div>
        <div>Generando texto al nivel ${level}…</div>
      </div>
    `;
  }

  // ── Passage Display ──
  const sentences = splitSentences(passageText);

  return html`
    <a class="back" href="index.html">← Inicio</a>
    <h1>Práctica de Enlace</h1>
    <p class="subtitle">Lee en voz alta — sigue los enlaces entre palabras</p>

    <div class="passage-card">
      <div class="legend">
        <div class="legend-item">
          <div class="legend-swatch" style="background:var(--link-cv)"></div>
          <span>Consonante + vocal</span>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:var(--link-vv)"></div>
          <span>Sinalefa (vocal + vocal)</span>
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:var(--link-cc)"></div>
          <span>Consonante doble</span>
        </div>
      </div>

      ${sentences.map((s,i)=>html`<${SentenceDisplay} text=${s} index=${i} key=${i} />`)}
    </div>

    <div class="bottom-buttons">
      <button class="btn-primary" onClick=${handleReset}>← Nueva selección</button>
      <button class="btn-ghost" onClick=${()=>doGenerate(sessionPassword)}>Otra vez (mismo nivel)</button>
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
