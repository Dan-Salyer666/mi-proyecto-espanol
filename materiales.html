<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materiales de Referencia — Español</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a1628;
  --bg-card: #111d35;
  --bg-card-hover: #162544;
  --bg-input: #0d1a2f;
  --border: #1e3355;
  --border-focus: #3b6cb5;
  --text-primary: #e2e8f0;
  --text-secondary: #8a9bb8;
  --text-muted: #5a6f8e;
  --accent: #4a90d9;
  --accent-glow: rgba(74,144,217,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;padding-bottom:4rem}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(74,144,217,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(99,102,241,0.06) 0%,transparent 50%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;opacity:.035;background-image:linear-gradient(30deg,#1e3355 12%,transparent 12.5%,transparent 87%,#1e3355 87.5%,#1e3355),linear-gradient(150deg,#1e3355 12%,transparent 12.5%,transparent 87%,#1e3355 87.5%,#1e3355),linear-gradient(30deg,#1e3355 12%,transparent 12.5%,transparent 87%,#1e3355 87.5%,#1e3355),linear-gradient(150deg,#1e3355 12%,transparent 12.5%,transparent 87%,#1e3355 87.5%,#1e3355),linear-gradient(60deg,#253d5e 25%,transparent 25.5%,transparent 75%,#253d5e 75%,#253d5e),linear-gradient(60deg,#253d5e 25%,transparent 25.5%,transparent 75%,#253d5e 75%,#253d5e);background-size:80px 140px;background-position:0 0,0 0,40px 70px,40px 70px,0 0,40px 70px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 1rem}

/* TOP BAR */
.top-bar{padding:1rem 0 0;display:flex;align-items:center}
.back-link{color:var(--text-muted);text-decoration:none;font-size:.875rem;transition:color .2s}
.back-link:hover{color:var(--accent)}

/* HEADER */
.page-header{text-align:center;padding:1.75rem 0 1.5rem}
.page-header h1{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(1.8rem,5vw,2.8rem);line-height:1.15;margin-bottom:.4rem}
.page-header p{color:var(--text-secondary);font-size:.9rem}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:1.5rem}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
#searchInput{width:100%;padding:.8rem 2.8rem .8rem 2.8rem;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
#searchInput:focus{border-color:var(--border-focus)}
#searchInput::placeholder{color:var(--text-muted)}
#searchClear{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:.3rem;display:none;font-size:1rem;line-height:1;transition:color .2s}
#searchClear:hover{color:var(--text-primary)}
#noResults{display:none;text-align:center;padding:2rem;color:var(--text-muted);font-size:.9rem}

/* RECURSOS CLAVE */
.recursos-section{margin-bottom:1.5rem}
.recursos-label{font-family:'DM Serif Display',serif;font-style:italic;font-size:.9rem;color:var(--text-muted);letter-spacing:.08em;margin-bottom:.7rem;padding-left:.1rem;text-transform:uppercase}
.rec-row{display:flex;flex-wrap:wrap;gap:.55rem;margin-bottom:.6rem}
.rec-btn{display:inline-flex;align-items:center;gap:.45rem;text-decoration:none;border-radius:10px;border:1px solid var(--border);font-family:'Outfit',sans-serif;transition:all .2s;white-space:nowrap}
.rec-btn.primary{padding:.65rem 1.15rem;background:linear-gradient(135deg,#1a2d4f,#1e3355);border-color:#2a4a75;color:var(--text-primary);font-size:.9rem;font-weight:600}
.rec-btn.primary:hover{border-color:var(--accent);color:var(--accent);background:linear-gradient(135deg,#1e3355,#1e3a5f)}
.rec-btn.secondary{padding:.42rem .85rem;background:var(--bg-card);color:var(--text-secondary);font-size:.82rem;font-weight:500}
.rec-btn.secondary:hover{border-color:#2a4a75;color:var(--accent)}

/* MAIN SECTIONS */
.main-section{margin-bottom:.65rem;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.main-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;background:var(--bg-card);cursor:pointer;user-select:none;transition:background .2s;gap:.75rem}
.main-hdr:hover{background:var(--bg-card-hover)}
.main-hdr.open{border-bottom:1px solid var(--border)}
.main-title{font-family:'DM Serif Display',serif;font-size:1.2rem;display:flex;align-items:center;gap:.55rem}
.main-meta{font-size:.72rem;color:var(--text-muted);font-family:'Outfit',sans-serif;font-weight:400;margin-top:.05rem}
.main-chevron{color:var(--text-muted);transition:transform .25s;flex-shrink:0}
.main-hdr.open .main-chevron{transform:rotate(180deg)}
.main-body{display:none;background:var(--bg-deep)}
.main-body.open{display:block}

/* CATEGORY DIVIDERS (within main section) */
.cat-divider{padding:.9rem 1.25rem .4rem;display:flex;align-items:center;gap:.75rem}
.cat-divider-label{font-family:'DM Serif Display',serif;font-style:italic;font-size:.95rem;color:var(--accent);opacity:.85}
.cat-divider-line{flex:1;height:1px;background:var(--border)}

/* SUB-SECTIONS (Level 2) */
.sub-section{border-top:1px solid var(--border)}
.sub-hdr{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.25rem .7rem 1.5rem;cursor:pointer;user-select:none;transition:background .15s;gap:.5rem;min-height:44px}
.sub-hdr:hover{background:rgba(255,255,255,.025)}
.sub-title{font-size:.9rem;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:.5rem;flex:1}
.sub-count{font-size:.68rem;background:rgba(74,144,217,.12);color:var(--accent);border-radius:20px;padding:.08rem .45rem;font-weight:500;flex-shrink:0}
.sub-chevron{color:var(--text-muted);transition:transform .2s;flex-shrink:0;width:14px;height:14px}
.sub-hdr.open .sub-chevron{transform:rotate(90deg)}
.sub-body{display:none;padding-bottom:.35rem}
.sub-body.open{display:block}

/* TOPIC LABELS */
.topic-label{font-size:.68rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.09em;padding:.7rem 1.25rem .25rem 1.9rem}

/* LINKS */
.link-item{display:flex;align-items:center;gap:.55rem;padding:.5rem 1.25rem .5rem 1.9rem;text-decoration:none;color:var(--text-primary);font-size:.855rem;transition:background .15s;min-height:44px;line-height:1.3}
.link-item:hover{background:rgba(74,144,217,.06);color:var(--accent)}
.link-icon{flex-shrink:0;font-size:.8rem;opacity:.65;width:16px;text-align:center}
.link-icon.dr{color:#34d399}
.link-icon.yt{color:#f87171}
.link-icon.wb{color:var(--accent)}
.link-name{flex:1}
.link-item.hidden{display:none!important}
.sub-section.all-hidden{display:none!important}
.cat-divider.all-hidden{display:none!important}
</style>
</head>

// ─── RENDER ────────────────────────────────────────────────
function countLinks(subs){
  return subs.reduce((n,s)=>n+s.content.filter(c=>c.includes('link-item')).length,0);
}

function renderSub(sub,mainId,subIdx){
  const linkCount=sub.content.filter(c=>c.includes('link-item')).length;
  const id=`sub-${mainId}-${subIdx}`;
  return `
<div class="sub-section" id="${id}">
  <div class="sub-hdr" onclick="toggleSub(this,'${id}')">
    <span class="sub-title">${sub.title} <span class="sub-count">${linkCount}</span></span>
    <svg class="sub-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
  </div>
  <div class="sub-body" id="body-${id}">${sub.content.join('')}</div>
</div>`;
}

function renderSection(sec){
  let html='';
  let totalLinks=0;
  sec.categories.forEach(cat=>{cat.subs.forEach(s=>{totalLinks+=s.content.filter(c=>c.includes('link-item')).length;});});

  sec.categories.forEach((cat,ci)=>{
    if(cat.label){
      html+=`<div class="cat-divider" id="catdiv-${sec.id}-${ci}"><span class="cat-divider-label">${cat.label}</span><div class="cat-divider-line"></div></div>`;
    }
    cat.subs.forEach((sub,si)=>{
      html+=renderSub(sub,`${sec.id}-${ci}`,si);
    });
  });

  return `
<div class="main-section" id="mainsec-${sec.id}">
  <div class="main-hdr" onclick="toggleMain(this,'main-body-${sec.id}')">
    <div>
      <div class="main-title">${sec.emoji} ${sec.title}</div>
      <div class="main-meta">${totalLinks} recursos</div>
    </div>
    <svg class="main-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
  </div>
  <div class="main-body" id="main-body-${sec.id}">${html}</div>
</div>`;
}

document.getElementById('root').innerHTML=DATA.map(renderSection).join('');

// ─── ACCORDION ─────────────────────────────────────────────
function toggleMain(hdr,bodyId){
  const body=document.getElementById(bodyId);
  const open=body.classList.toggle('open');
  hdr.classList.toggle('open',open);
}
function toggleSub(hdr,id){
  const body=document.getElementById('body-'+id);
  const open=body.classList.toggle('open');
  hdr.classList.toggle('open',open);
}

// ─── SEARCH ────────────────────────────────────────────────
const inp=document.getElementById('searchInput');
const clr=document.getElementById('searchClear');
const noRes=document.getElementById('noResults');
const noQ=document.getElementById('noQ');

inp.addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  clr.style.display=q?'block':'none';

  if(!q){
    // restore all
    document.querySelectorAll('.link-item').forEach(el=>el.classList.remove('hidden'));
    document.querySelectorAll('.sub-section').forEach(el=>el.classList.remove('all-hidden'));
    document.querySelectorAll('.cat-divider').forEach(el=>el.classList.remove('all-hidden'));
    document.querySelectorAll('.main-body').forEach(el=>{el.classList.remove('open');});
    document.querySelectorAll('.main-hdr').forEach(el=>el.classList.remove('open'));
    noRes.style.display='none';
    return;
  }

  let totalVisible=0;
  // show all main bodies
  document.querySelectorAll('.main-body').forEach(el=>el.classList.add('open'));
  document.querySelectorAll('.main-hdr').forEach(el=>el.classList.add('open'));

  // filter links
  document.querySelectorAll('.link-item').forEach(el=>{
    const match=el.dataset.s.includes(q);
    el.classList.toggle('hidden',!match);
    if(match)totalVisible++;
  });

  // hide sub-sections with no visible links
  document.querySelectorAll('.sub-section').forEach(sub=>{
    const visLinks=sub.querySelectorAll('.link-item:not(.hidden)').length;
    if(visLinks===0){
      sub.classList.add('all-hidden');
    } else {
      sub.classList.remove('all-hidden');
      document.getElementById('body-'+sub.id).classList.add('open');
      sub.querySelector('.sub-hdr').classList.add('open');
    }
  });

  // hide cat-dividers where all subs are hidden
  document.querySelectorAll('.cat-divider').forEach(div=>{
    const id=div.id; // catdiv-secid-ci
    const parts=id.split('-');
    const secId=parts[1];
    const ci=parts[2];
    // check if all subs in this category are hidden
    const siblings=document.querySelectorAll(`[id^="sub-${secId}-${ci}-"]`);
    let hasVisible=false;
    siblings.forEach(s=>{if(!s.classList.contains('all-hidden'))hasVisible=true;});
    div.classList.toggle('all-hidden',!hasVisible);
  });

  noRes.style.display=totalVisible===0?'block':'none';
  if(totalVisible===0)noQ.textContent=q;
});

clr.addEventListener('click',function(){
  inp.value='';
  inp.dispatchEvent(new Event('input'));
  inp.focus();
});
</script>
