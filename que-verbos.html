<style>
:root {

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background-color: var(--bg-deep);
  color: var(--text-primary);

  overflow-x: hidden;
}

}
body::after {
  content:''; position:fixed; top:0; left:0; right:0; bottom:0;

#root { position:relative; z-index:1; min-height:100vh; }

@keyframes fadeSlideIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn      { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp     { from { opacity:0; transform:translateY(48px); } to { opacity:1; transform:translateY(0); } }

.view-fade { animation: fadeSlideIn 0.3s ease both; }

.btn {
  font-family:'Outfit',sans-serif; font-weight:500; font-size:0.9rem;
  border:none; border-radius:10px; padding:12px 22px;
  cursor:pointer; transition:all 0.2s ease; letter-spacing:0.02em;
}
.btn-primary {
  background:linear-gradient(135deg,#3b6cb5,#4a90d9); color:#fff;

}
.btn-primary:hover { box-shadow:0 4px 20px rgba(74,144,217,0.4); transform:translateY(-1px); }
.btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-ghost {
  background:transparent; color:var(--text-secondary); border:1px solid var(--border);
  cursor:pointer; transition:all 0.2s; border-radius:10px;
  font-family:'Outfit',sans-serif; font-size:0.85rem; padding:9px 18px; font-weight:400;
}
.btn-ghost:hover { background:var(--bg-card-hover); color:var(--text-primary); border-color:var(--border-focus); }

.main { min-height:100vh; display:flex; flex-direction:column; }

.top-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:15px 28px; border-bottom:1px solid var(--border);
  background:rgba(10,22,40,0.85); backdrop-filter:blur(10px);
  position:sticky; top:0; z-index:20;
}
.top-bar-title {
  font-family:'DM Serif Display',serif; font-size:1.25rem; font-style:italic;
  background:linear-gradient(135deg,#e2e8f0 0%,#f0a0b0 100%);

}
.breadcrumb { display:flex; align-items:center; gap:8px; font-size:0.78rem; }
.breadcrumb-link { color:var(--accent); cursor:pointer; transition:opacity 0.15s; }
.breadcrumb-link:hover { opacity:0.8; text-decoration:underline; }
.breadcrumb-sep { color:var(--text-muted); opacity:0.5; }
.breadcrumb-current { color:var(--text-secondary); font-weight:500; }

.tree-container {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:16px 16px 32px;
}
.tree-intro { text-align:center; margin-bottom:10px; max-width:520px; }
.tree-intro p { color:var(--text-muted); font-size:0.8rem; font-weight:300; }
.tree-svg-wrapper { width:100%; max-width:860px; }
.tree-svg-wrapper svg { width:100%; height:auto; display:block; }

.verb-node { cursor:pointer; }
.verb-node .node-bg { transition:opacity 0.2s; }
.verb-node .node-border { transition:stroke-opacity 0.2s, filter 0.2s; }
.verb-node:hover .node-bg { opacity:0.22 !important; }
.verb-node:hover .node-border { stroke-opacity:1 !important; filter:url(#glow-node); }

.detail-container {
  padding:28px 28px 60px; max-width:760px; margin:0 auto; width:100%;
}
.detail-header { margin-bottom:24px; }
.detail-verb-hero {
  font-family:'DM Serif Display',serif; font-size:2.4rem; font-weight:400;
  margin-bottom:5px; line-height:1.1;
}
.detail-core-def { color:var(--text-muted); font-size:0.88rem; font-weight:300; }

.detail-note {
  background:rgba(74,144,217,0.05); border:1px solid rgba(74,144,217,0.18);
  border-left:3px solid var(--accent);
  border-radius:10px; padding:14px 17px; margin-bottom:22px;
  color:var(--text-secondary); font-size:0.85rem; line-height:1.6; font-weight:300;
}
.detail-note strong { color:var(--text-primary); font-weight:600; }
.detail-note em { font-style:italic; color:var(--text-primary); }

.pattern-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:14px;
  padding:20px 22px; margin-bottom:14px; transition:border-color 0.2s;
}
.pattern-card:hover { border-color:#2a4a75; }
.pattern-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:8px; flex-wrap:wrap; }
.pattern-name { font-family:'DM Serif Display',serif; font-size:1.1rem; line-height:1.3; }
.pattern-tags { display:flex; gap:5px; flex-wrap:wrap; }

.tag {

}

.pattern-def {
  color:var(--text-secondary); font-size:0.88rem; margin-bottom:12px; line-height:1.55; font-weight:300;
}
.pattern-def em { font-style:italic; color:var(--text-primary); }
.pattern-structure { font-size:0.76rem; font-weight:500; color:var(--accent); margin-bottom:10px; opacity:0.85; }

.example-card {
  background:var(--bg-input); border:1px solid var(--border); border-radius:10px;
  padding:13px 16px; margin-bottom:8px; transition:border-color 0.15s;
}
.example-card:hover { border-color:#2a4a75; }
.example-es {
  font-family:'DM Serif Display',serif; font-size:1rem; font-style:italic;
  color:var(--text-primary); margin-bottom:4px; line-height:1.4;
}
.example-en { color:var(--text-secondary); font-size:0.8rem; font-weight:300; line-height:1.4; }

.mas-btn {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:12px; padding:8px 16px;
  background:transparent; border:1px solid var(--border); border-radius:10px;

  font-size:0.82rem; font-weight:400; cursor:pointer; transition:all 0.2s;
}
.mas-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }

.api-area {
  margin-top:12px; padding:14px; border-radius:10px; display:none;
  background:rgba(74,144,217,0.04); border:1px solid rgba(74,144,217,0.12);
}
.api-area.visible { display:block; animation:fadeSlideIn 0.25s ease; }
.usage-note {
  background:rgba(74,144,217,0.05); border:1px solid rgba(74,144,217,0.18);
  border-radius:10px; padding:14px 17px; margin-top:12px;
  color:var(--text-secondary); font-size:0.83rem; line-height:1.55; font-weight:300;
}
.usage-note-label {
  font-size:0.63rem; font-weight:700; text-transform:uppercase; letter-spacing:0.11em;
  color:var(--accent); margin-bottom:6px;
}

.pw-inline {
  display:none; margin-top:10px; padding:14px 16px;
  background:var(--bg-input); border:1px solid var(--border); border-radius:12px;
}
.pw-inline.visible { display:block; }
.pw-inline-label {
  font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.1em;
  color:var(--accent); margin-bottom:10px;
}
.pw-inline-row { display:flex; gap:8px; }
.text-input {
  flex:1; background:var(--bg-deep); border:1px solid var(--border);
  border-radius:10px; padding:10px 14px; color:var(--text-primary);
  font-family:'Outfit',sans-serif; font-size:0.9rem; font-weight:300; outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.text-input::placeholder { color:var(--text-muted); }
.text-input:focus { border-color:var(--border-focus); box-shadow:0 0 0 3px var(--accent-glow); }

.spinner {
  width:20px; height:20px; border:2px solid var(--border);
  border-top-color:var(--accent); border-radius:50%; animation:spin 0.75s linear infinite; flex-shrink:0;
}
.spinner-row {
  display:flex; align-items:center; gap:10px;
  color:var(--text-muted); font-size:0.83rem; padding:16px 0;
}

.special-card {
  background:var(--bg-card); border:1px solid rgba(78,205,196,0.3); border-radius:14px;
  padding:18px 22px; margin-top:26px; display:flex; align-items:center;
  justify-content:space-between; cursor:pointer; transition:all 0.25s;
}
.special-card:hover { border-color:#4ECDC4; background:var(--bg-card-hover); transform:translateY(-1px); }
.special-card-title { font-family:'DM Serif Display',serif; font-size:1.05rem; color:#4ECDC4; }
.special-card-desc { color:var(--text-muted); font-size:0.82rem; margin-top:2px; }
.special-card-arrow { color:#4ECDC4; font-size:1.3rem; flex-shrink:0; }

.cmp-table {
  width:100%; border-collapse:separate; border-spacing:0;
  border-radius:10px; overflow:hidden; margin-bottom:24px;
}
.cmp-table th {
  background:var(--bg-deep); padding:11px 16px; text-align:left;
  font-weight:600; font-size:0.72rem; text-transform:uppercase;
  letter-spacing:0.08em; color:var(--text-muted); border-bottom:1px solid var(--border);
}
.cmp-table td {
  padding:12px 16px; font-size:0.88rem; color:var(--text-secondary);
  border-bottom:1px solid rgba(30,51,85,0.5); background:var(--bg-card);
}
.cmp-table tr:last-child td { border-bottom:none; }
.cmp-table .verb-cell {
  font-family:'DM Serif Display',serif; font-style:italic;
  color:var(--text-primary); font-size:1rem;
}

@media (max-width: 600px) {
  .top-bar { padding:12px 16px; }
  .top-bar-title { font-size:1.05rem; }
  .detail-container { padding:18px 16px 50px; }
  .detail-verb-hero { font-size:1.9rem; }
  .tree-container { padding:10px 8px 24px; }
  .pattern-head { flex-direction:column; gap:6px; }
  .special-card { flex-direction:column; align-items:flex-start; gap:6px; }
  .breadcrumb { font-size:0.7rem; gap:5px; }
}
</style>

<script type="module">
import { html, render, useState, useEffect } from 'https://unpkg.com/htm/preact/standalone.module.js';

const VERB_GROUPS = [

      { id:'quedar', label:'quedar', isProno:false, coreDef:'To remain, be left, fit, arrange to meet, be located', note:null, patterns:[
        { name:'To be left / remain (quantity)', def:'Indicates availability or leftovers — what\'s still there after something is used or gone.', tags:[{l:'Everyday',c:'#34d399'},{l:'Como gustar',c:'#4ECDC4'}], structure:'quedar + subject (thing remaining) · IO optional', examples:[{es:'No me queda leche.',en:'I don\'t have any milk left.'},{es:'¿Cuántas entradas quedan?',en:'How many tickets are left?'}] },
        { name:'To fit or suit', def:'Describes how something looks or fits on someone. The clothing/item is the subject, the person is the indirect object.', tags:[{l:'Everyday',c:'#34d399'},{l:'Como gustar',c:'#4ECDC4'}], structure:'quedar + bien/mal/grande/chico + IO', examples:[{es:'Ese vestido te queda bien.',en:'That dress suits you well.'},{es:'Los zapatos me quedan grandes.',en:'The shoes are too big on me.'}] },
        { name:'To arrange to meet', def:'Making social plans or agreeing on a time/place. Very common in Spain; in Argentina you\'re more likely to hear <em>verse, juntarse, encontrarse</em>.', tags:[{l:'Everyday',c:'#34d399'},{l:'More Spain',c:'#FF6B6B'}], structure:'quedar + en + place/time · quedar en + infinitive', examples:[{es:'¿A qué hora quedamos?',en:'What time shall we meet?'},{es:'Quedamos en vernos en la oficina.',en:'We agreed to meet at the office.'}] },
        { name:'To be located', def:'A common alternative to <em>estar</em> for fixed locations.', tags:[{l:'Everyday',c:'#34d399'}], structure:'quedar + en/cerca de/lejos de + place', examples:[{es:'El cine queda cerca de aquí.',en:'The cinema is located near here.'},{es:'La iglesia queda en la esquina de esas calles.',en:'The church is on the corner of those streets.'}] },
        { name:'To be left as an outcome or result', def:'Often for final states or outcomes — competitions, situations, impressions.', tags:[{l:'Everyday',c:'#34d399'}], structure:'quedar + adjective/adverb/position', examples:[{es:'Quedamos muy tristes con la noticia.',en:'We were really sad about the news.'},{es:'Quedamos terceros.',en:'We finished third.'},{es:'La pared quedó perfecta.',en:'The wall turned out perfect.'}] },
        { name:'Quedar en + infinitive', def:'Specifically for making an agreement or settling on a plan.', tags:[{l:'Everyday',c:'#34d399'}], structure:'quedar en + infinitive', examples:[{es:'¿En qué quedamos?',en:'So what did we agree on?'},{es:'Quedamos en no decirle nada.',en:'We agreed not to tell him anything.'}] },
        { name:'Quedar por + infinitive', def:'Something still needs to be done — the task is pending.', tags:[{l:'Everyday',c:'#34d399'}], structure:'quedar por + infinitive', examples:[{es:'Queda por resolver ese tema.',en:'That issue remains to be resolved.'},{es:'Quedan por pintar dos habitaciones.',en:'Two rooms are still left to paint.'}] },
      ]},
      { id:'quedarse', label:'quedarse', isProno:true, coreDef:'To stay, to keep, to become (change of state), to run out of', note:'<strong>Quedarse vs. ponerse</strong> for change of state: <em>ponerse</em> marks a temporary, reversible reaction (<em>se puso nervioso</em>). <em>Quedarse</em> emphasizes the aftermath or end result — the new state feels more lasting (<em>se quedó mudo</em>).', patterns:[
        { name:'To stay / remain in a place', def:'The subject stays put — choosing not to leave.', tags:[{l:'Everyday',c:'#34d399'},{l:'Pronominal',c:'#4ECDC4'}], structure:'quedarse + en + place', examples:[{es:'Me quedo en casa.',en:'I\'m staying home.'},{es:'Nos quedamos en el hotel todo el día.',en:'We stayed at the hotel all day.'}] },
        { name:'To become / end up in a state', def:'Used with adjectives for transitions caused by an external event. Emphasizes the aftermath, unlike <em>ponerse</em> which is temporary.', tags:[{l:'Everyday',c:'#34d399'},{l:'Pronominal',c:'#4ECDC4'}], structure:'quedarse + adjective', examples:[{es:'Se quedó mudo de la sorpresa.',en:'He was left speechless from surprise.'},{es:'Se quedó ciego.',en:'He went blind.'},{es:'Me quedé helado cuando me contó.',en:'I froze when he told me.'}] },
        { name:'To keep something', def:'Retaining possession. Uses <em>quedarse con</em>.', tags:[{l:'Everyday',c:'#34d399'},{l:'Pronominal',c:'#4ECDC4'}], structure:'quedarse con + thing', examples:[{es:'Me quedo con este libro.',en:'I\'ll keep this book.'},{es:'Quédate con el cambio.',en:'Keep the change.'}] },
        { name:'To run out of something', def:'Uses <em>quedarse sin</em> — the thing is gone.', tags:[{l:'Everyday',c:'#34d399'},{l:'Pronominal',c:'#4ECDC4'}], structure:'quedarse sin + noun', examples:[{es:'Nos quedamos sin gasolina.',en:'We ran out of gas.'},{es:'Me quedé sin batería.',en:'My battery died.'}] },
        { name:'Quedarse en blanco', def:'To go blank — your mind empties.', tags:[{l:'Everyday',c:'#34d399'},{l:'Idiomatic',c:'#FF9F1C'}], structure:'quedarse en blanco', examples:[{es:'Me quedé en blanco en el examen.',en:'I went blank during the exam.'},{es:'Cuando me preguntó, me quedé en blanco.',en:'When he asked me, my mind went blank.'}] },
        { name:'Quedarse corto', def:'To fall short, to underestimate.', tags:[{l:'Everyday',c:'#34d399'},{l:'Idiomatic',c:'#FF9F1C'}], structure:'quedarse corto (+ con/en)', examples:[{es:'Me quedé corto con la comida para la fiesta.',en:'I didn\'t make enough food for the party.'},{es:'Decir que es bueno es quedarse corto.',en:'Saying it\'s good is an understatement.'}] },
        { name:'Quedarse dormido', def:'To fall asleep — often unintentional.', tags:[{l:'Everyday',c:'#34d399'},{l:'Pronominal',c:'#4ECDC4'}], structure:'quedarse dormido/a', examples:[{es:'Se quedó dormido en el sofá.',en:'He fell asleep on the couch.'},{es:'Me quedé dormida y llegué tarde.',en:'I fell asleep and was late.'}] },

  {
    id:'querer-group', color:'#f59e0b', angle:-30,

        { name:'To want', def:'The core, most common meaning.', tags:[{l:'Everyday',c:'#34d399'}], structure:'querer + noun / querer + infinitive', examples:[{es:'Quiero un café.',en:'I want a coffee.'},{es:'No quiero salir esta noche.',en:'I don\'t want to go out tonight.'}] },
        { name:'To love (people)', def:'Expressing love for people. Less intense than <em>amar</em> in romantic contexts, but the default "I love you" in everyday speech.', tags:[{l:'Everyday',c:'#34d399'}], structure:'querer + a + person', examples:[{es:'Te quiero mucho.',en:'I love you a lot.'},{es:'Quiero a mis abuelos.',en:'I love my grandparents.'}] },

        { name:'Sin querer — unintentionally', def:'By accident, without meaning to.', tags:[{l:'Everyday',c:'#34d399'},{l:'Idiomatic',c:'#FF9F1C'}], structure:'sin querer', examples:[{es:'Lo hice sin querer.',en:'I did it by accident.'},{es:'Sin querer borré todos los archivos.',en:'I accidentally deleted all the files.'}] },

        { name:'To burn food', def:'Overcooking to the point of burning.', tags:[{l:'Everyday',c:'#34d399'}], structure:'quemar + food item', examples:[{es:'Quemé la comida otra vez.',en:'I burned the food again.'},{es:'Cuidado que vas a quemar el arroz.',en:'Careful, you\'re going to burn the rice.'}] },

const VERB_MAP = {};
VERB_GROUPS.forEach(g => g.verbs.forEach(v => { VERB_MAP[v.id] = { ...v, groupColor: g.color }; }));

let sessionPassword = '';

async function callAPI(system, userMsg) {
  const res = await fetch('/api/claude', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password:sessionPassword, model:'claude-sonnet-4-20250514', max_tokens:1000, system, messages:[{role:'user',content:userMsg}] })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error||'API error');
  const raw = data.content?.[0]?.text||'';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

function Tag({ label, color }) {
  return html`<span class="tag" style=${{ color, background:color+'18', border:'1px solid '+color+'40' }}>${label}</span>`;
}

function ExampleCard({ es, en }) {
  return html`<div class="example-card"><div class="example-es">${es}</div><div class="example-en">${en}</div></div>`;
}

function ApiSection({ verbLabel, patternName, patternDef, structure }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [needsPw, setNeedsPw] = useState(false);
  const [pwInput, setPwInput] = useState('');
  const [pwErr, setPwErr] = useState('');
  const [pwBusy, setPwBusy] = useState(false);
  const [open, setOpen] = useState(false);

  const doFetch = async () => {
    setLoading(true); setError('');
    try {
      const result = await callAPI(
        'You are a Spanish language tutor for an adult B2-level English-speaking learner interested in Rioplatense Spanish. Generate example sentences that are natural and varied. Use neutral Spanish with occasional Rioplatense flavor where natural.\n\nRespond ONLY with valid JSON — no markdown, no preamble. Format:\n{"examples":[{"es":"...","en":"..."},{"es":"...","en":"..."},{"es":"...","en":"..."},{"es":"...","en":"..."}],"nota":"A brief usage note in English (2-3 sentences) with practical tips about this pattern."}',
        'Generate 4 natural example sentences for "'+verbLabel+'" in the pattern: "'+patternName+'" — '+(patternDef||'').replace(/<[^>]*>/g,'')+'\nStructure: '+(structure||'N/A')+'\nVary contexts, subjects, tenses. B2 level.'
      );
      setData(result);
    } catch(e) {
      if (e.message && e.message.includes('incorrect')) { sessionPassword=''; setNeedsPw(true); }
      else setError('Could not load examples. Try again.');
    }
    setLoading(false);
  };

  const handleClick = () => {
    if (data) { setOpen(!open); return; }
    if (!sessionPassword) { setNeedsPw(true); return; }
    setOpen(true); doFetch();
  };

  const submitPw = async () => {
    setPwBusy(true); setPwErr('');
    try {
      const res = await fetch('/api/claude', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ password:pwInput, model:'claude-sonnet-4-20250514', max_tokens:10, messages:[{role:'user',content:'hi'}] })
      });
      if (res.ok) { sessionPassword=pwInput; setNeedsPw(false); setOpen(true); doFetch(); }
      else { const d = await res.json(); setPwErr(d.error||'Contraseña incorrecta'); }
    } catch { setPwErr('Error de conexión.'); }
    setPwBusy(false);
  };

  return html`
    <div>
      <button class="mas-btn" onClick=${handleClick}>✦ Más ejemplos${data?(open?' ▾':' ▸'):''}</button>
      ${needsPw?html`
        <div class="pw-inline visible">
          <div class="pw-inline-label">Contraseña requerida para generar ejemplos</div>
          <div class="pw-inline-row">
            <input class="text-input" type="password" placeholder="Contraseña" value=${pwInput} onInput=${e=>setPwInput(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&pwInput&&submitPw()} disabled=${pwBusy}/>
            <button class="btn btn-primary" style="padding:10px 20px" onClick=${submitPw} disabled=${!pwInput||pwBusy}>${pwBusy?'...':'OK'}</button>
          </div>
          ${pwErr?html`<div style="color:#f87171;font-size:0.78rem;margin-top:8px">${pwErr}</div>`:null}
        </div>
      `:null}
      ${open&&!needsPw?html`
        <div class="api-area visible">
          ${loading?html`<div class="spinner-row"><div class="spinner"></div><span>Generando ejemplos…</span></div>`
          :error?html`<div style="color:#f87171;font-size:0.82rem">${error}</div><button class="btn-ghost" style="font-size:0.8rem;padding:6px 14px;margin-top:6px" onClick=${doFetch}>Reintentar</button>`
          :data?html`
            ${data.examples.map((ex,i)=>html`<${ExampleCard} key=${i} es=${ex.es} en=${ex.en}/>`)}
            ${data.nota?html`<div class="usage-note"><div class="usage-note-label">Nota de uso</div>${data.nota}</div>`:null}
          `:null}
        </div>
      `:null}
    </div>
  `;
}

function PatternCard({ p, verbLabel }) {
  return html`
    <div class="pattern-card">
      <div class="pattern-head">
        <div class="pattern-name">${p.name}</div>
        <div class="pattern-tags">${p.tags.map((t,i)=>html`<${Tag} key=${i} label=${t.l} color=${t.c}/>`)}</div>

      <div class="pattern-def" dangerouslySetInnerHTML=${{__html:p.def}}/>
      ${p.structure?html`<div class="pattern-structure">⟶ ${p.structure}</div>`:null}
      ${p.examples.map((ex,i)=>html`<${ExampleCard} key=${i} es=${ex.es} en=${ex.en}/>`)}
      <${ApiSection} verbLabel=${verbLabel} patternName=${p.name} patternDef=${p.def} structure=${p.structure}/>
    </div>
  `;
}

function TreeSVG({ onSelectVerb }) {
  const CX=440, CY=430, SPOKE_R=195, FORK_LEN=125, FORK_SPREAD=30;
  const NW=122, NH=38;
  const deg2rad = d => d*Math.PI/180;

  return html`
    <svg viewBox="0 0 880 860" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-center"><feGaussianBlur stdDeviation="10" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-node"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      <circle cx=${CX} cy=${CY} r="76" fill="none" stroke="rgba(232,99,122,0.08)" stroke-width="1"/>

      ${VERB_GROUPS.map(group => {
        const rad = deg2rad(group.angle);
        const sx = CX + SPOKE_R * Math.cos(rad);
        const sy = CY + SPOKE_R * Math.sin(rad);

        if (group.verbs.length === 2) {
          const a1 = deg2rad(group.angle - FORK_SPREAD);
          const a2 = deg2rad(group.angle + FORK_SPREAD);
          const n1x = sx + FORK_LEN*Math.cos(a1), n1y = sy + FORK_LEN*Math.sin(a1);
          const n2x = sx + FORK_LEN*Math.cos(a2), n2y = sy + FORK_LEN*Math.sin(a2);
          const v0 = group.verbs[0], v1 = group.verbs[1];

          return html`<g key=${group.id}>
            <line x1=${CX} y1=${CY} x2=${sx} y2=${sy} stroke=${group.color} stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 4"/>
            <line x1=${sx} y1=${sy} x2=${n1x} y2=${n1y} stroke=${group.color} stroke-width="1" stroke-opacity="0.2"/>
            <line x1=${sx} y1=${sy} x2=${n2x} y2=${n2y} stroke=${group.color} stroke-width="1" stroke-opacity="0.2"/>
            <circle cx=${sx} cy=${sy} r="3" fill=${group.color} opacity="0.4"/>
            <g class="verb-node" onClick=${()=>onSelectVerb(v0.id)} style="cursor:pointer">
              <rect class="node-bg" x=${n1x-NW/2} y=${n1y-NH/2} width=${NW} height=${NH} rx="9" fill=${group.color} opacity="0.08"/>
              <rect class="node-border" x=${n1x-NW/2} y=${n1y-NH/2} width=${NW} height=${NH} rx="9" fill="none" stroke=${group.color} stroke-width="1.2" stroke-opacity="0.6"/>
              <text x=${n1x} y=${n1y+1} text-anchor="middle" dominant-baseline="central" fill=${group.color} font-family="'DM Serif Display',serif" font-size="13.5" font-style="italic">${v0.label}</text>
            </g>
            <g class="verb-node" onClick=${()=>onSelectVerb(v1.id)} style="cursor:pointer">
              <rect class="node-bg" x=${n2x-NW/2} y=${n2y-NH/2} width=${NW} height=${NH} rx="9" fill=${group.color} opacity="0.08"/>
              <rect class="node-border" x=${n2x-NW/2} y=${n2y-NH/2} width=${NW} height=${NH} rx="9" fill="none" stroke=${group.color} stroke-width="1.2" stroke-opacity="0.6"/>
              <text x=${n2x} y=${n2y+1} text-anchor="middle" dominant-baseline="central" fill=${group.color} font-family="'DM Serif Display',serif" font-size="13.5" font-style="italic">${v1.label}</text>
            </g>
          </g>`;
        } else {
          const v = group.verbs[0];
          return html`<g key=${group.id}>
            <line x1=${CX} y1=${CY} x2=${sx} y2=${sy} stroke=${group.color} stroke-width="1" stroke-opacity="0.25" stroke-dasharray="4 4"/>
            <g class="verb-node" onClick=${()=>onSelectVerb(v.id)} style="cursor:pointer">
              <rect class="node-bg" x=${sx-NW/2} y=${sy-NH/2} width=${NW} height=${NH} rx="9" fill=${group.color} opacity="0.08"/>
              <rect class="node-border" x=${sx-NW/2} y=${sy-NH/2} width=${NW} height=${NH} rx="9" fill="none" stroke=${group.color} stroke-width="1.2" stroke-opacity="0.6"/>
              <text x=${sx} y=${sy-4} text-anchor="middle" fill=${group.color} font-family="'DM Serif Display',serif" font-size="13.5" font-style="italic">${v.label}</text>
              <text x=${sx} y=${sy+13} text-anchor="middle" fill="#5a6f8e" font-family="Outfit,sans-serif" font-size="7.5" font-weight="600" letter-spacing="1.5">SOLO PRONOMINAL</text>
            </g>
          </g>`;
        }
      })}

      <g>
        <circle cx=${CX} cy=${CY} r="70" fill="rgba(232,99,122,0.04)" stroke="rgba(232,99,122,0.12)" stroke-width="1"/>
        <circle cx=${CX} cy=${CY} r="58" fill="#0f1e38" stroke=${CENTER_COLOR} stroke-width="1.8" filter="url(#glow-center)"/>
        <text x=${CX} y=${CY-6} text-anchor="middle" fill=${CENTER_COLOR} font-family="'DM Serif Display',serif" font-size="26" font-style="italic">Que-</text>
        <text x=${CX} y=${CY+14} text-anchor="middle" fill="#5a6f8e" font-family="Outfit,sans-serif" font-size="7.5" letter-spacing="2">VERBOS</text>
      </g>
    </svg>
  `;
}

      ${needsPw?html`
        <div class="pw-inline visible">
          <div class="pw-inline-label">Contraseña requerida</div>
          <div class="pw-inline-row">
            <input class="text-input" type="password" placeholder="Contraseña" value=${pwInput} onInput=${e=>setPwInput(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&pwInput&&submitPw()} disabled=${pwBusy}/>
            <button class="btn btn-primary" style="padding:10px 20px" onClick=${submitPw} disabled=${!pwInput||pwBusy}>${pwBusy?'...':'OK'}</button>
          </div>
          ${pwErr?html`<div style="color:#f87171;font-size:0.78rem;margin-top:8px">${pwErr}</div>`:null}
        </div>
      `:null}
      ${open&&!needsPw?html`
        <div class="api-area visible">
          ${loading?html`<div class="spinner-row"><div class="spinner"></div><span>Generando ejemplos…</span></div>`
          :error?html`<div style="color:#f87171;font-size:0.82rem">${error}</div>`
          :data?html`
            ${data.examples.map((ex,i)=>html`<${ExampleCard} key=${i} es=${ex.es} en=${ex.en}/>`)}
            ${data.nota?html`<div class="usage-note"><div class="usage-note-label">Nota de uso</div>${data.nota}</div>`:null}
          `:null}
        </div>
      `:null}
    </div>
  `;
}

function MeetingVerbsView() {
  return html`
    <div class="detail-container view-fade">
      <div class="detail-header">
        <div class="detail-verb-hero" style=${{color:'#4ECDC4'}}>Verbos de Encuentro</div>
        <div class="detail-core-def">¿Quedar, verse, encontrarse, conocer, reunirse?</div>
      </div>
      <div class="detail-note">Spanish has several verbs for "meeting" someone — and they're not interchangeable. Each one signals a different type of encounter.</div>
      <table class="cmp-table">
        <thead><tr><th>Verb</th><th>Type of Meeting</th><th>Translation</th></tr></thead>
        <tbody>${MEETING_VERBS.map((mv,i)=>html`<tr key=${i}><td class="verb-cell">${mv.verb}</td><td>${mv.type.split('—')[0].trim()}</td><td>${mv.translation}</td></tr>`)}</tbody>
      </table>
      ${MEETING_VERBS.map((mv,i)=>html`
        <div class="pattern-card" key=${i}>
          <div class="pattern-head">
            <div class="pattern-name">${mv.verb}</div>
            <div class="pattern-tags">${mv.tags.map((t,j)=>html`<${Tag} key=${j} label=${t.l} color=${t.c}/>`)}</div>
          </div>
          <div class="pattern-def"><strong>${mv.translation}</strong> — ${mv.type}</div>
          ${mv.examples.map((ex,j)=>html`<${ExampleCard} key=${j} es=${ex.es} en=${ex.en}/>`)}
          <${MeetingApiSection} verb=${mv.verb} type=${mv.type} translation=${mv.translation}/>
        </div>
      `)}
    </div>
  `;
}

function App() {
  const [view, setView] = useState('tree');
  const [selVerb, setSelVerb] = useState(null);

  const goTree = () => { setView('tree'); setSelVerb(null); };
  const goVerb = (id) => { setSelVerb(id); setView('verb'); };
  const goMeeting = () => { setView('meeting'); };

  const verbData = selVerb ? VERB_MAP[selVerb] : null;

  return html`
    <div class="main">
      <div class="top-bar">
        <div style="display:flex;align-items:center;gap:16px">
          <a href="index.html" style="color:var(--text-muted);font-size:0.78rem;text-decoration:none;transition:color 0.15s"
            onMouseover=${e=>e.target.style.color='var(--accent)'}
            onMouseout=${e=>e.target.style.color='var(--text-muted)'}>← Inicio</a>
          <div class="top-bar-title">Verbos con Que-</div>
        </div>
        <div class="breadcrumb">
          ${view==='tree'?html`<span style="color:var(--text-muted);font-size:0.78rem">haz clic en un verbo para explorar</span>`
          :view==='verb'?html`
            <span class="breadcrumb-link" onClick=${goTree}>árbol</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current" style=${{color:verbData?.groupColor}}>${verbData?.label}</span>
          `:html`
            <span class="breadcrumb-link" onClick=${goTree}>árbol</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-link" onClick=${()=>goVerb('quedar')}>quedar</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current" style=${{color:'#4ECDC4'}}>encuentro</span>
          `}
        </div>
      </div>

      ${view==='tree'?html`
        <div class="tree-container view-fade">
          <div class="tree-intro"><p>Haz clic en un verbo para ver todos sus patrones de uso.</p></div>
          <div class="tree-svg-wrapper"><${TreeSVG} onSelectVerb=${goVerb}/></div>
        </div>
      `:view==='verb'?html`
        <${VerbDetail} verbId=${selVerb} onGoMeeting=${goMeeting}/>
      `:html`
        <${MeetingVerbsView}/>
      `}
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>
