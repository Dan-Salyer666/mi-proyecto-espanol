<body>
<div class="wrap" id="app"></div>
<script type="module">
import{html,render,useState,useRef}from'https://unpkg.com/htm/preact/standalone.module.js';

let sessionPassword='';
function getDialect(){try{return localStorage.getItem('spanish_dialect')||'neutral'}catch(e){return'neutral'}}

/* ═══════════════════════════════════════════════════
   CORE PHONOLOGY HELPERS
   ═══════════════════════════════════════════════════ */
const VOWELS='aáeéiíoóuúü';
const STRONG='aáeéoó'; const ACCWEAK='íú'; const SPECIALS='ʎʀʧ';
const isV=c=>c&&VOWELS.includes(c);
const isC=c=>c&&!isV(c)&&(/[bcdfghjklmnñpqrstvwxyz]/i.test(c)||SPECIALS.includes(c));
const isS=c=>STRONG.includes(c); const isW=c=>'iíuúü'.includes(c); const isAW=c=>ACCWEAK.includes(c);
const CLUSTERS=new Set(['bl','br','cl','cr','dr','fl','fr','gl','gr','pl','pr','tr','tl']);
function baseV(c){const m={'á':'a','é':'e','í':'i','ó':'o','ú':'u','ü':'u'};return m[c]||c}
function hasAcc(c){return'áéíóú'.includes(c)}

/* ── Digraph encoding ── */
function encDigraphs(s){
  let o='',map=[];
  for(let i=0;i<s.length;){
    if(i+1<s.length){const d=s[i]+s[i+1];
      if(d==='ll'){o+='ʎ';map.push(i);i+=2;continue}
      if(d==='rr'){o+='ʀ';map.push(i);i+=2;continue}
      if(d==='ch'){o+='ʧ';map.push(i);i+=2;continue}
    }
    o+=s[i];map.push(i);i++;
  }
  return{enc:o,map};
}
function decSyl(s){return s.replace(/ʎ/g,'ll').replace(/ʀ/g,'rr').replace(/ʧ/g,'ch')}

/* ═══════════════════════════════════════════════════
   SYLLABIFIER (digraph-aware via encoding)
   ═══════════════════════════════════════════════════ */
function syllabifyEnc(w){
  if(!w)return[];
  let syls=[],cur='',i=0;
  while(i<w.length){
    // Onset
    while(i<w.length&&!isV(w[i])){cur+=w[i];i++}
    // Nucleus
    if(i<w.length&&isV(w[i])){
      cur+=w[i];i++;
      while(i<w.length&&isV(w[i])){
        const p=w[i-1],c=w[i];
        if(isS(p)&&isS(c))break;
        if(isAW(p))break;
        if(isAW(c))break;
        cur+=w[i];i++;
      }
    }
    // Coda
    let j=i,run=[];
    while(j<w.length&&!isV(w[j])){run.push(w[j]);j++}
    const nV=j<w.length,n=run.length;
    let codaN=0;
    if(!nV){codaN=n}
    else if(n===0){codaN=0}
    else if(n===1){codaN=0}
    else if(n===2){
      if(run[0].length===1&&run[1].length===1&&CLUSTERS.has(run[0]+run[1]))codaN=0;
      else codaN=1;
    }else if(n===3){
      if(run[1].length===1&&run[2].length===1&&CLUSTERS.has(run[1]+run[2]))codaN=1;
      else codaN=2;
    }else{
      const l2=run[n-2],l1=run[n-1];
      if(l2.length===1&&l1.length===1&&CLUSTERS.has(l2+l1))codaN=n-2;
      else codaN=n-1;
    }
    for(let k=0;k<codaN;k++){cur+=run[k];i++}
    if(!nV)i=j;
    if(cur){syls.push(cur);cur=''}
  }
  return syls;
}

function syllabifyWord(word){
  const{enc}=encDigraphs(word);
  return syllabifyEnc(enc).map(decSyl);
}

/* ═══════════════════════════════════════════════════
   STRESS DETECTION
   ═══════════════════════════════════════════════════ */
const ATONIC=new Set([
  'el','la','los','las','al','del','un',
  'me','te','se','nos','os','lo','le','les',
  'mi','tu','su','mis','tus','sus',
  'a','de','en','con','por','para','sin','ante','bajo','contra','desde','entre','hacia','hasta','sobre','tras',
  'y','o','e','u','que','ni','pues','como','si','pero','mas'
]);
function isAtonic(w){return ATONIC.has(w.replace(/[.,;:!?¡¿…—–"«»""''()[\]{}]/g,'').toLowerCase())}

function findStressIdx(word,syls){
  if(!syls.length)return 0;
  for(let i=0;i<syls.length;i++){if(/[áéíóú]/.test(syls[i]))return i}
  const lc=word[word.length-1];
  if('nsaeiouáéíóúü'.includes(lc))return Math.max(0,syls.length-2);
  return syls.length-1;
}

/* ═══════════════════════════════════════════════════
   ENLACE DETECTION
   ═══════════════════════════════════════════════════ */
const PAUSE_RE=/[.,;:!?…—–\n¡¿]/;
function lastSound(w){for(let i=w.length-1;i>=0;i--){if(isV(w[i])||isC(w[i]))return w[i]}return''}
function firstSound(w){for(let i=0;i<w.length;i++){if(w[i].toLowerCase()==='h')continue;if(isV(w[i])||isC(w[i]))return w[i]}return''}
function hasPause(w){return PAUSE_RE.test(w[w.length-1]||'')}

function detectLink(a,b){
  if(!a||!b||hasPause(a))return null;
  const e=lastSound(a),s=firstSound(b);
  if(!e||!s)return null;
  const eV=isV(e),eC=isC(e),sV=isV(s),sC=isC(s);
  if(eC&&sV)return'cv';
  if(eV&&sV)return'vv';
  if(eC&&sC&&e.toLowerCase()===s.toLowerCase())return'cc';
  return null;
}

function analyze(text){
  const words=text.split(/\s+/).filter(Boolean);
  const links=words.map((w,i)=>i<words.length-1?detectLink(w,words[i+1]):null);
  return{words,links};
}

/* ═══════════════════════════════════════════════════
   CHAIN EXTRACTION
   ═══════════════════════════════════════════════════ */
function extractChains(words,links){
  const chains=[];let i=0;
  while(i<words.length){
    if(links[i]){
      const cw=[words[i]],cl=[];
      while(i<words.length-1&&links[i]){cl.push(links[i]);cw.push(words[i+1]);i++}
      chains.push({words:cw,links:cl,startIdx:i-cw.length+1});i++;
    }else{i++}
  }
  return chains;
}

/* ═══════════════════════════════════════════════════
   CHAIN → PHONETIC (merge + syllabify + stress)
   ═══════════════════════════════════════════════════ */
function processChain(origWords,linkTypes){
  const cln=w=>w.replace(/[.,;:!?¡¿…—–"«»""''()[\]{}]/g,'').toLowerCase();
  const words=origWords.map(cln);

  // Build merged string with stress tracking
  let merged='';
  const stressPos=new Set(); // positions of stressed vowels in merged
  const chunkBounds=[]; // merged positions where non-VV links create chunk breaks

  for(let wi=0;wi<words.length;wi++){
    let w=words[wi];
    let wStart=merged.length;

    if(wi>0){
      const link=linkTypes[wi-1];

      // VV: remove silent h at start of next word
      if(link==='vv'&&w.startsWith('h')){w=w.slice(1)}

      if(link==='vv'){
        // Same-vowel merge: drop one
        const lastCh=merged[merged.length-1];
        const firstCh=w[0];
        if(lastCh&&firstCh&&isV(lastCh)&&isV(firstCh)&&baseV(lastCh)===baseV(firstCh)){
          if(hasAcc(lastCh)){w=w.slice(1)} // drop first of new word (keep accented)
          else{merged=merged.slice(0,-1)} // drop last of merged
        }
        wStart=merged.length;
      }else if(link==='cc'){
        const lc=merged[merged.length-1]?.toLowerCase();
        const fc=w[0]?.toLowerCase();
        if(lc==='r'&&fc==='r'){/* keep both for rolled rr */}
        else{merged=merged.slice(0,-1)} // drop duplicate consonant
        wStart=merged.length;
        chunkBounds.push(wStart);
      }else{// cv
        wStart=merged.length;
        chunkBounds.push(wStart);
      }
    }

    // Mark stressed vowel positions
    if(!isAtonic(w)){
      const syls=syllabifyWord(w);
      if(syls.length){
        const si=findStressIdx(w,syls);
        let cp=0;for(let s=0;s<si;s++)cp+=syls[s].length;
        const ss=syls[si]||'';
        for(let c=0;c<ss.length;c++){
          if(isV(ss[c]))stressPos.add(wStart+cp+c);
        }
      }
    }
    merged+=w;
  }

  // Syllabify merged string via encoding
  const{enc,map}=encDigraphs(merged);
  const eSyls=syllabifyEnc(enc);

  // Build syllable data with stress + decode
  let ePos=0;
  const sylData=[];
  for(const es of eSyls){
    let stressed=false;
    for(let k=0;k<es.length;k++){
      const origP=map[ePos+k];
      if(origP!==undefined&&stressPos.has(origP)&&isV(merged[origP]))stressed=true;
    }
    sylData.push({text:decSyl(es),stressed});
    ePos+=es.length;
  }

  // Identify chunk breaks (syllable indices)
  const chunkBreaks=new Set();
  if(chunkBounds.length){
    // Map merged-string positions to syllable indices
    let mPos=0;
    const sylStarts=sylData.map(s=>{const p=mPos;mPos+=s.text.length;return p});
    for(const cb of chunkBounds){
      for(let s=0;s<sylStarts.length;s++){
        if(sylStarts[s]>=cb){chunkBreaks.add(s);break}
      }
    }
  }

  return{sylData,chunkBreaks,origText:origWords.join(' ')};
}

/* ═══════════════════════════════════════════════════
   LANE ASSIGNMENT (dual underlines for overlaps)
   ═══════════════════════════════════════════════════ */
const LCOLORS={cv:'#4a90d9',vv:'#f59e0b',cc:'#a78bfa'};

function assignLanes(words,links){
  // For each link, assign lane 1 or 2
  const linkLane=new Array(links.length).fill(null);
  let curLane=1;
  for(let i=0;i<links.length;i++){
    if(!links[i]){curLane=1;continue}
    if(i>0&&links[i-1]){curLane=curLane===1?2:1} // overlap → alternate
    else{curLane=1}
    linkLane[i]=curLane;
  }
  // Per-word: {lane1:{type,color}, lane2:{type,color}}
  const wl=words.map(()=>({lane1:null,lane2:null}));
  for(let i=0;i<links.length;i++){
    if(!linkLane[i])continue;
    const lane=linkLane[i],type=links[i],color=LCOLORS[type];
    const key=lane===1?'lane1':'lane2';
    if(!wl[i][key])wl[i][key]={type,color};
    if(!wl[i+1][key])wl[i+1][key]={type,color};
  }
  return wl;
}

/* ═══════════════════════════════════════════════════
   TTS
   ═══════════════════════════════════════════════════ */
let ttsRate=1.0;
function speak(t){
  if(!window.speechSynthesis)return;speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang='es-AR';u.rate=ttsRate;
  const v=speechSynthesis.getVoices();
  const p=v.find(x=>/es[-_](AR|419|MX|US)/i.test(x.lang))||v.find(x=>/^es/i.test(x.lang));
  if(p)u.voice=p;speechSynthesis.speak(u);
}
if(window.speechSynthesis)speechSynthesis.getVoices();

/* ═══════════════════════════════════════════════════
   API
   ═══════════════════════════════════════════════════ */
const SEEDS=['el transporte público','un viaje inesperado','la historia de un barrio','una receta de familia','un partido de fútbol','la vida en el campo','una mudanza','el primer día de trabajo','un misterio en la ciudad','la música y los recuerdos','un error que salió bien','las estaciones del año','una amistad inesperada','el mercado del domingo','aprender algo nuevo','una tormenta de verano','la tecnología y los abuelos','un secreto de infancia','las costumbres de otro país','una noche sin dormir','los vecinos ruidosos','un regalo perfecto','la playa en invierno','una entrevista de trabajo','el arte callejero','una carta perdida','un café con un desconocido','la astronomía','los animales del barrio','una fiesta sorpresa','el último tren','cocinar para muchos'];

async function generate(pw,level,theme,dialect){
  const d=dialect==='rioplatense'?'Usa español rioplatense argentino con formas de vos e imperativo voseante.':'Usa español neutro con formas de tú. No uses voseo.';
  const t=theme.trim()?`Tema del texto: ${theme.trim()}.`:`Elige un tema interesante y original. Sugerencia: "${SEEDS[Math.floor(Math.random()*SEEDS.length)]}". Sé creativo — no repitas temas.`;
  const system=`Eres un generador de textos para práctica de lectura en voz alta en español.\nGenera un texto de 4-5 párrafos cortos (3-4 oraciones cada uno) al nivel ${level}.\n${d}\n${t}\nEl texto debe fluir con naturalidad y contener buena variedad de combinaciones entre palabras:\nconsonante final + vocal inicial, vocal + vocal, y consonantes iguales entre palabras.\nNo fuerces estos patrones — simplemente escribí de forma natural y fluida.\nDevuelve SOLO el texto en párrafos, sin títulos, sin explicaciones, sin comillas.`;
  const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw,model:'claude-sonnet-4-20250514',max_tokens:1200,system,messages:[{role:'user',content:'Genera el texto ahora.'}]})});
  if(!res.ok)throw new Error(res.status===401?'pw':'Error: '+res.status);
  const data=await res.json();
  return((data.content?.[0]?.text)||'').replace(/```[a-z]*\n?/g,'').replace(/```/g,'').trim();
}

function PhoneticChainDisplay({chain}){
  const{sylData,chunkBreaks,origText}=chain;

  // Build flowing + syllabified lines
  const flowParts=[];const sylParts=[];
  let chunk=[];
  sylData.forEach((s,i)=>{
    if(chunkBreaks.has(i)&&chunk.length){
      flowParts.push(chunk);sylParts.push([...chunk]);chunk=[];
    }
    chunk.push(s);
  });
  if(chunk.length){flowParts.push(chunk);sylParts.push([...chunk])}

  const renderFlow=()=>{
    const els=[];
    flowParts.forEach((ch,ci)=>{
      if(ci>0)els.push(html`<span class="unstressed" key=${'fs'+ci}>${' '}</span>`);
      ch.forEach((s,si)=>{
        els.push(html`<span class=${s.stressed?'stressed':'unstressed'} key=${'f'+ci+'-'+si}>${s.stressed?s.text.toUpperCase():s.text}</span>`);
      });
    });
    return els;
  };

  const renderSyl=()=>{
    const els=[];
    sylParts.forEach((ch,ci)=>{
      if(ci>0)els.push(html`<span class="unstressed" key=${'ss'+ci}>${' - '}</span>`);
      ch.forEach((s,si)=>{
        if(si>0)els.push(html`<span class="unstressed" key=${'d'+ci+'-'+si}>-</span>`);
        els.push(html`<span class=${s.stressed?'stressed':'unstressed'} key=${'s'+ci+'-'+si}>${s.stressed?s.text.toUpperCase():s.text}</span>`);
      });
    });
    return els;
  };

  return html`
    <div class="ph-chain">
      <div class="ph-label">${origText}</div>
      <div class="ph-line">${renderFlow()}</div>
      <div class="ph-line" style="margin-top:2px">${renderSyl()}</div>
    </div>
  `;
}

function SentenceDisplay({text}){
  const[open,setOpen]=useState(false);
  const{words,links}=analyze(text);
  const chains=extractChains(words,links);
  const chainData=chains.map(ch=>processChain(ch.words,ch.links));
  const wl=assignLanes(words,links);

  // Render words with dual-lane underlines
  const wordEls=words.map((w,i)=>{
    const l1=wl[i].lane1,l2=wl[i].lane2;
    if(!l1&&!l2)return html`<span key=${'w'+i}>${w} </span>`;

    // Build inline style for underlines
    // Lane 1: offset 3px, Lane 2: offset 7px
    if(l1&&l2){
      // Two nested spans for two underlines
      const s1=`text-decoration:underline;text-decoration-color:${l1.color};text-underline-offset:3px;text-decoration-thickness:2px;text-decoration-skip-ink:none;`;
      const s2=`text-decoration:underline;text-decoration-color:${l2.color};text-underline-offset:7px;text-decoration-thickness:2px;text-decoration-skip-ink:none;`;
      return html`<span style=${s1} key=${'w'+i}><span style=${s2}>${w}</span></span> `;
    }
    const ln=l1||l2;
    const off=l1?3:7;
    const st=`text-decoration:underline;text-decoration-color:${ln.color};text-underline-offset:${off}px;text-decoration-thickness:2px;text-decoration-skip-ink:none;`;
    return html`<span style=${st} key=${'w'+i}>${w}</span> `;
  });

  return html`
    <div class="sentence-block">
      <div class="sentence-text">${wordEls}</div>
      <div class="sentence-controls">
        <button class="btn-icon" onClick=${()=>speak(text)} title="Escuchar">🔊</button>
        ${chainData.length>0&&html`
          <button class="btn-expand" onClick=${()=>setOpen(!open)}>
            ${open?'▾ ocultar enlaces fonéticos':'▸ ver enlaces fonéticos'}
          </button>
        `}
      </div>
      ${chainData.length>0&&html`
        <div class="phonetic-panel ${open?'open':''}">
          ${chainData.map((cd,ci)=>html`<${PhoneticChainDisplay} chain=${cd} key=${ci}/>`)}
        </div>
      `}
    </div>
  `;
}

function splitSentences(text){return text.split(/(?<=[.!?…])\s+/).filter(s=>s.trim())}

/* ── Shared UI ── */
function RulesCard(){
  return html`
    <div class="card">
      <h2>¿Qué es el enlace?</h2>
      <p>En español hablado, las palabras no se pronuncian por separado — se encadenan dentro de cada frase, creando un flujo continuo de sonido. Este fenómeno se llama <em>enlace</em> o <em>encadenamiento</em>.</p>
      <h3 style="margin-top:18px">Reglas de enlace</h3>
      <div style="margin-top:10px">
        <div class="rule-row"><div class="rule-dot" style="background:var(--link-cv)"></div><div><div class="rule-label">Consonante + Vocal</div><div class="rule-example">La consonante final salta a la sílaba siguiente: "los ojos" → lo - so - jos</div></div></div>
        <div class="rule-row"><div class="rule-dot" style="background:var(--link-vv)"></div><div><div class="rule-label">Vocal + Vocal (sinalefa)</div><div class="rule-example">Las vocales se funden en una sola sílaba: "mi amigo" → mia - mi - go</div></div></div>
        <div class="rule-row"><div class="rule-dot" style="background:var(--link-cc)"></div><div><div class="rule-label">Consonante + Misma consonante</div><div class="rule-example">Se pronuncia una sola vez (r+r = rr vibrante): "dos sillas" → do - si - llas</div></div></div>
      </div>
      <p style="margin-top:14px;font-size:.88rem;color:var(--text-muted)">La <strong style="color:var(--text-secondary)">H</strong> es invisible — nunca bloquea el enlace: "mi hermano" → mier - ma - no</p>
      <p style="font-size:.88rem;color:var(--text-muted)">La <strong style="color:var(--text-secondary)">Y</strong> funciona como consonante: "playa es" → enlace consonante + vocal.</p>
      <div class="rule-section">
        <div class="rule-section-title">¿Cuándo NO se enlazan?</div>
        <div class="no-link-row"><span class="no-link-dot">✕</span><span>Dos consonantes <em>diferentes</em>: "el gato" — la L y la G no se combinan</span></div>
        <div class="no-link-row"><span class="no-link-dot">✕</span><span>Vocal seguida de consonante: "va con" — la A y la C no se enlazan</span></div>
        <div class="no-link-row"><span class="no-link-dot">✕</span><span>Puntuación (comas, puntos, etc.) — pausa natural para respirar</span></div>
      </div>
    </div>
  `;
}

function ReadingLegend(){
  return html`
    <div class="legend">
      <div class="legend-row"><div class="legend-swatch" style="background:var(--link-cv)"></div><span class="legend-label">Consonante + vocal</span><span class="legend-ex">los ojos → <b>lo - so - jos</b></span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:var(--link-vv)"></div><span class="legend-label">Sinalefa (vocal + vocal)</span><span class="legend-ex">mi amigo → <b>mia - mi - go</b></span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:var(--link-cc)"></div><span class="legend-label">Consonante doble</span><span class="legend-ex">dos sillas → <b>do - si - llas</b></span></div>
      <div class="stress-note"><div class="stress-swatch"></div><span><b style="color:var(--stress)">MAYÚSCULAS verdes</b> = sílaba acentuada en el flujo fonético</span></div>
      <div class="legend-note">
        <strong>No se enlazan:</strong>
        <div class="no-link-compact">
          <span><span class="x">✕</span> consonantes diferentes</span>
          <span><span class="x">✕</span> vocal + consonante</span>
          <span><span class="x">✕</span> puntuación = pausa</span>
        </div>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════ */
function App(){
  const[screen,setScreen]=useState('select');
  const[level,setLevel]=useState('B2');
  const[theme,setTheme]=useState('');
  const[themeOpen,setThemeOpen]=useState(true);
  const[passage,setPassage]=useState('');
  const[error,setError]=useState('');
  const[rate,setRate]=useState('normal');
  const pwRef=useRef(null);
  const dialect=getDialect();

  function pickRate(r){setRate(r);ttsRate=r==='lento'?.75:r==='rapido'?1.25:1.0}
  async function doGen(pw){
    setScreen('loading');setError('');
    try{const t=await generate(pw,level,theme,dialect);setPassage(t);setScreen('passage')}
    catch(e){if(e.message==='pw'){sessionPassword='';setError('Contraseña incorrecta');setScreen('pw')}else{setError(e.message);setScreen('select')}}
  }
  function go(){if(!sessionPassword)setScreen('pw');else doGen(sessionPassword)}
  function submitPw(){const pw=pwRef.current?.value?.trim();if(!pw)return;sessionPassword=pw;doGen(pw)}

  if(screen==='select'||screen==='pw'){
    return html`
      <a class="back" href="index.html">← Inicio</a>
      <h1>Práctica de Enlace</h1>
      <p class="subtitle">Lectura en voz alta con fluidez natural</p>
      <${RulesCard}/>
      <div class="card">
        <h2>Generar texto</h2>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
          <span class="dialect-tag">${dialect==='rioplatense'?'Rioplatense (vos)':'Español neutro (tú)'}</span>
          <span style="font-size:.78rem;color:var(--text-muted)">— se cambia desde la página principal</span>
        </div>
        <div class="field-label">Nivel</div>
        <div class="btn-row">${['A2','B1','B2','C1'].map(l=>html`<button class="btn-opt ${level===l?'active':''}" onClick=${()=>setLevel(l)}>${l}</button>`)}</div>
        <div class="field-label">Tema</div>
        <div class="check-row"><input type="checkbox" id="thk" checked=${themeOpen} onChange=${e=>{setThemeOpen(e.target.checked);if(!e.target.checked)setTheme('')}}/><label for="thk">Elegir tema</label></div>
        <input class="text-input" style="margin-bottom:18px" placeholder="Ej: viajes, comida, historia argentina…" value=${theme} onInput=${e=>setTheme(e.target.value)} disabled=${!themeOpen}/>
        ${error&&html`<div class="error-msg">${error}</div>`}
        ${screen==='pw'?html`
          <div style="margin-bottom:14px"><div class="field-label">Contraseña</div>
          <div class="pw-row"><input class="pw-input" type="password" ref=${pwRef} placeholder="Contraseña" onKeyDown=${e=>{if(e.key==='Enter')submitPw()}}/><button class="pw-btn" onClick=${submitPw}>→</button></div></div>
        `:html`<button class="btn-primary" onClick=${go}>Generar texto</button>`}
      </div>
    `;
  }

  if(screen==='loading'){
    return html`<a class="back" href="index.html">← Inicio</a><h1>Práctica de Enlace</h1>
      <div class="loading"><div class="spinner"></div><div>Generando texto al nivel ${level}…</div></div>`;
  }

  const sentences=splitSentences(passage);
  return html`
    <a class="back" href="index.html">← Inicio</a>
    <h1>Práctica de Enlace</h1>
    <p class="subtitle">Lee en voz alta — sigue los enlaces entre palabras</p>
    <div class="passage-card">
      <${ReadingLegend}/>
      <div class="rate-bar">
        <span class="rate-label">Velocidad 🔊</span>
        ${[['lento','Lento'],['normal','Normal'],['rapido','Rápido']].map(([k,lb])=>html`<button class="rate-btn ${rate===k?'active':''}" onClick=${()=>pickRate(k)}>${lb}</button>`)}
      </div>
      ${sentences.map((s,i)=>html`<${SentenceDisplay} text=${s} key=${i}/>`)}
    </div>
    <div class="bottom-buttons">
      <button class="btn-primary" onClick=${()=>{setPassage('');setScreen('select')}}>← Nueva selección</button>
      <button class="btn-ghost" onClick=${()=>doGen(sessionPassword)}>Otra vez (mismo nivel)</button>
    </div>
  `;
}

render(html`<${App}/>`,document.getElementById('app'));
</script>
