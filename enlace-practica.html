<!DOCTYPE html>
<html lang="es">

<style>

  --bg-deep:       #0a1628;
  --bg-card:       #111d35;
  --bg-card-hover: #162544;

  --link-cv-bg:    rgba(74,144,217,0.12);

* { margin:0; padding:0; box-sizing:border-box; }

body {

.wrap { max-width:820px;margin:0 auto;padding:24px 20px 60px;position:relative;z-index:1; }

.back { display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:0.9rem;margin-bottom:18px; }

.rule-row { display:flex;align-items:flex-start;gap:12px;margin-bottom:14px; }

.rule-example { color:var(--text-muted);font-size:0.88rem;font-style:italic; }
.rule-section { margin-top:18px;padding-top:14px;border-top:1px solid var(--border); }
.rule-section-title { font-weight:600;font-size:0.9rem;color:var(--text-secondary);margin-bottom:10px; }
.no-link-row { display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:0.88rem;color:var(--text-muted); }
.no-link-dot { color:#f87171;font-weight:700;flex-shrink:0;margin-top:1px; }

.field-label { font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;font-weight:500; }
.btn-row { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px; }
.btn-opt {
  padding:8px 18px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--text-secondary);font-family:'Outfit',sans-serif;

}
.btn-opt:hover { border-color:#2a4a75;color:var(--text-primary); }
.btn-opt.active { background:linear-gradient(135deg,#3b6cb5,#4a90d9);color:#fff;border-color:transparent; }
.text-input {
  width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);

.btn-primary {
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#3b6cb5,#4a90d9);color:#fff;

.btn-ghost {
  padding:10px 22px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--text-secondary);font-family:'Outfit',sans-serif;

}

.pw-row { display:flex;gap:8px;margin-bottom:14px;align-items:center; }
.pw-input {
  flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg-input);color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:0.9rem;outline:none;
}
.pw-input:focus { border-color:var(--border-focus); }
.pw-btn {
  padding:8px 16px;border-radius:8px;border:none;
  background:linear-gradient(135deg,#3b6cb5,#4a90d9);color:#fff;

}

.loading { text-align:center;padding:40px 0;color:var(--text-muted); }
.spinner { display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ── PASSAGE ── */
.passage-card {
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  padding:28px 24px;margin-bottom:20px;
}

.legend { margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border); }
.legend-row { display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap; }
.legend-swatch { width:22px;height:4px;border-radius:2px;flex-shrink:0; }
.legend-label { font-size:0.85rem;color:var(--text-secondary);min-width:160px; }
.legend-ex { font-size:0.85rem;color:var(--text-muted);font-style:italic; }
.legend-ex b { font-style:normal;font-weight:600; }

.sentence-block { margin-bottom:24px; }
.sentence-text {
  font-family:'DM Serif Display',serif;font-size:1.18rem;line-height:2.4;
}
.link-group {
  display:inline;padding:1px 3px;
  border-bottom:2.5px solid transparent;
  border-radius:3px;
}
.link-group.cv  { border-bottom-color:var(--link-cv); background:var(--link-cv-bg); }
.link-group.vv  { border-bottom-color:var(--link-vv); background:var(--link-vv-bg); }
.link-group.cc  { border-bottom-color:var(--link-cc); background:var(--link-cc-bg); }

.sentence-controls { display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap; }
.btn-icon {
  width:30px;height:30px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;font-size:0.85rem;
  transition:all 0.2s;flex-shrink:0;
}
.btn-icon:hover { border-color:var(--accent);color:var(--accent); }
.btn-expand {
  font-size:0.8rem;color:var(--text-muted);cursor:pointer;background:none;
  border:none;font-family:'Outfit',sans-serif;padding:2px 6px;border-radius:4px;
}
.btn-expand:hover { color:var(--accent); }

.phonetic-panel {
  display:none;margin-top:8px;padding:12px 16px;border-radius:10px;
  background:rgba(74,144,217,0.05);border:1px solid rgba(74,144,217,0.1);
}
.phonetic-panel.open { display:block; }
.ph-pair { margin-bottom:8px;font-size:0.92rem;line-height:1.6; }
.ph-pair:last-child { margin-bottom:0; }
.ph-original { color:var(--text-secondary); }
.ph-arrow { color:var(--text-muted);margin:0 8px; }
.ph-result { font-weight:600;letter-spacing:0.5px; }
.ph-result.cv { color:var(--link-cv); }
.ph-result.vv { color:var(--link-vv); }
.ph-result.cc { color:var(--link-cc); }

.rate-bar { display:flex;align-items:center;gap:8px;margin-bottom:18px; }
.rate-label { font-size:0.82rem;color:var(--text-muted); }
.rate-btn {
  padding:4px 12px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text-muted);font-family:'Outfit',sans-serif;
  font-size:0.78rem;cursor:pointer;transition:all 0.2s;
}
.rate-btn:hover { border-color:#2a4a75;color:var(--text-primary); }
.rate-btn.active { background:rgba(74,144,217,0.15);color:var(--accent);border-color:rgba(74,144,217,0.3); }

.bottom-buttons { display:flex;gap:12px;flex-wrap:wrap;margin-top:24px; }

.dialect-tag {
  display:inline-block;padding:3px 10px;border-radius:6px;font-size:0.78rem;font-weight:500;
  background:rgba(74,144,217,0.08);color:var(--accent);border:1px solid rgba(74,144,217,0.15);
}
.error-msg { color:#f87171;font-size:0.9rem;margin-top:8px; }

@media(max-width:600px){
  .wrap { padding:16px 14px 40px; }
  h1 { font-size:1.6rem; }
  .sentence-text { font-size:1.05rem; }
  .passage-card { padding:20px 16px; }
  .legend-label { min-width:auto; }
}

<body>
<div class="wrap" id="app"></div>

<script type="module">
import{html,render,useState,useRef}from'https://unpkg.com/htm/preact/standalone.module.js';

let sessionPassword = '';

function getDialect(){
  try{ return localStorage.getItem('spanish_dialect')||'neutral'; }catch(e){ return 'neutral'; }
}

/* ═══════════════════════════════════════════
   ENLACE ENGINE
   ═══════════════════════════════════════════ */
const VOWELS = new Set('aáeéiíoóuúüAÁEÉIÍOÓUÚÜ');
const CON_RE = /[bcdfghjklmnñpqrstvwxyz]/i;
const PAUSE_RE = /[.,;:!?…—–\n¡¿]/;

function isV(c){ return VOWELS.has(c); }
function isC(c){ return c && (CON_RE.test(c) || c.toLowerCase()==='y'); }

function lastSound(w){
  for(let i=w.length-1;i>=0;i--){ const c=w[i]; if(isV(c)||isC(c)) return c; }
  return '';
}
function firstSound(w){
  for(let i=0;i<w.length;i++){
    const c=w[i];
    if(c.toLowerCase()==='h') continue;
    if(isV(c)||isC(c)) return c;
  }
  return '';
}
function hasPause(w){ return PAUSE_RE.test(w[w.length-1]||''); }

function detectLink(a,b){
  if(!a||!b||hasPause(a)) return null;
  const e=lastSound(a), s=firstSound(b);
  if(!e||!s) return null;
  const eV=isV(e), eC=isC(e), sV=isV(s), sC=isC(s);
  if(eC && sV) return 'cv';
  if(eV && sV) return 'vv';
  if(eC && sC && e.toLowerCase()===s.toLowerCase()) return 'cc';
  return null;
}

function analyze(text){
  const words = text.split(/\s+/).filter(Boolean);
  const links = words.map((w,i) => i<words.length-1 ? detectLink(w,words[i+1]) : null);
  return {words, links};
}

/* ─── Phonetic pair display (Gemini style) ─── */
function phoneticPair(wA, wB, type){
  let a = wA.replace(/[.,;:!?¡¿…—–"«»""''()]/g,'').toLowerCase();
  let b = wB.replace(/[.,;:!?¡¿…—–"«»""''()]/g,'').toLowerCase();
  // Remove silent h at start of b for phonetic display
  let bPhon = b.replace(/^h/i,'');

  if(type==='cv'){
    // Last consonant(s) of A jump to B
    let cut = a.length;
    while(cut>0 && isC(a[cut-1])) cut--;
    if(cut===0) cut=1; // keep at least first char
    return a.slice(0,cut) + ' - ' + a.slice(cut) + bPhon;
  }
  if(type==='vv'){
    return a + bPhon;
  }
  if(type==='cc'){
    return a + bPhon.slice(1);
  }
  return a + ' ' + b;
}

function getLinkedPairs(words, links){
  const pairs = [];
  for(let i=0;i<links.length;i++){
    if(links[i]){
      pairs.push({
        original: words[i]+' '+words[i+1],
        phonetic: phoneticPair(words[i], words[i+1], links[i]),
        type: links[i]
      });
    }
  }
  return pairs;
}

function splitSentences(text){
  return text.split(/(?<=[.!?…])\s+/).filter(s=>s.trim());
}

/* ═══════════════════════════════════════════
   TTS
   ═══════════════════════════════════════════ */
let ttsRate = 1.0;

function speak(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='es-AR'; u.rate=ttsRate;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v=>/es[-_](AR|419|MX|US)/i.test(v.lang))
    || voices.find(v=>/^es/i.test(v.lang));
  if(v) u.voice=v;
  speechSynthesis.speak(u);
}
if(window.speechSynthesis) speechSynthesis.getVoices();

/* ═══════════════════════════════════════════
   API
   ═══════════════════════════════════════════ */
const SEEDS=[
  'el transporte público','un viaje inesperado','la historia de un barrio','una receta de familia',
  'un partido de fútbol','la vida en el campo','una mudanza','el primer día de trabajo',
  'un misterio en la ciudad','la música y los recuerdos','un error que salió bien',
  'las estaciones del año','una amistad inesperada','el mercado del domingo',
  'aprender algo nuevo','una tormenta de verano','la tecnología y los abuelos',
  'un secreto de infancia','las costumbres de otro país','una noche sin dormir',
  'los vecinos ruidosos','un regalo perfecto','la playa en invierno',
  'una entrevista de trabajo','el arte callejero','una carta perdida',
  'un café con un desconocido','la astronomía','los animales del barrio',
  'una fiesta sorpresa','el último tren','cocinar para muchos'
];

async function generate(pw, level, theme, dialect){
  const dInstr = dialect==='rioplatense'
    ? 'Usa español rioplatense argentino con formas de vos e imperativo voseante.'
    : 'Usa español neutro con formas de tú. No uses voseo.';

  let tInstr;
  if(theme.trim()){
    tInstr = `Tema del texto: ${theme.trim()}.`;
  } else {
    const seed = SEEDS[Math.floor(Math.random()*SEEDS.length)];
    tInstr = `Elige un tema interesante y original. Sugerencia de partida (adaptala libremente): "${seed}". Sé creativo — no repitas temas.`;
  }

  const system = `Eres un generador de textos para práctica de lectura en voz alta en español.
Genera un texto de 4-5 párrafos cortos (3-4 oraciones cada uno) al nivel ${level}.
${dInstr}
${tInstr}
El texto debe fluir con naturalidad y contener buena variedad de combinaciones entre palabras:
consonante final + vocal inicial, vocal + vocal, y consonantes iguales entre palabras.
No fuerces estos patrones — simplemente escribí de forma natural y fluida.
Devuelve SOLO el texto en párrafos, sin títulos, sin explicaciones, sin comillas.`;

  const res = await fetch('/api/claude',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      password:pw, model:'claude-sonnet-4-20250514', max_tokens:1200,
      system, messages:[{role:'user',content:'Genera el texto ahora.'}]
    })
  });
  if(!res.ok) throw new Error(res.status===401?'pw':'Error: '+res.status);
  const data = await res.json();
  let text = (data.content?.[0]?.text)||'';
  return text.replace(/```[a-z]*\n?/g,'').replace(/```/g,'').trim();
}

/* ═══════════════════════════════════════════
   COMPONENTS
   ═══════════════════════════════════════════ */

function SentenceDisplay({text}){
  const [open, setOpen] = useState(false);
  const {words, links} = analyze(text);
  const pairs = getLinkedPairs(words, links);

  // Build visual groups: consecutive linked words with same type get grouped
  const elems = [];
  let i = 0;
  while(i < words.length){
    if(links[i]){
      const type = links[i];
      const grp = [words[i]];
      let j = i;
      while(j < words.length-1 && links[j] === type){
        grp.push(words[j+1]); j++;
      }
      elems.push(html`<span class="link-group ${type}" key=${'g'+i}>${grp.join(' ')}</span>`);
      elems.push(' ');
      i = j+1;
    } else {
      elems.push(html`<span key=${'w'+i}>${words[i]}</span>`);
      elems.push(' ');
      i++;
    }
  }

  return html`
    <div class="sentence-block">
      <div class="sentence-text">${elems}</div>
      <div class="sentence-controls">
        <button class="btn-icon" onClick=${()=>speak(text)} title="Escuchar">🔊</button>
        ${pairs.length>0 && html`
          <button class="btn-expand" onClick=${()=>setOpen(!open)}>
            ${open?'▾ ocultar enlaces fonéticos':'▸ ver enlaces fonéticos'}
          </button>
        `}
      </div>
      ${pairs.length>0 && html`
        <div class="phonetic-panel ${open?'open':''}">
          ${pairs.map((p,j)=>html`
            <div class="ph-pair" key=${j}>
              <span class="ph-original">${p.original}</span>
              <span class="ph-arrow">→</span>
              <span class="ph-result ${p.type}">${p.phonetic}</span>
            </div>
          `)}
        </div>
      `}
    </div>
  `;
}

function App(){
  const [screen, setScreen] = useState('select');
  const [level, setLevel] = useState('B2');
  const [theme, setTheme] = useState('');
  const [themeOpen, setThemeOpen] = useState(true);
  const [passage, setPassage] = useState('');
  const [error, setError] = useState('');
  const [rate, setRate] = useState('normal');
  const pwRef = useRef(null);
  const dialect = getDialect();

  function pickRate(r){
    setRate(r);
    ttsRate = r==='lento'?0.75 : r==='rapido'?1.25 : 1.0;
  }

  async function doGen(pw){
    setScreen('loading'); setError('');
    try{
      const t = await generate(pw, level, theme, dialect);
      setPassage(t); setScreen('passage');
    }catch(e){
      if(e.message==='pw'){ sessionPassword=''; setError('Contraseña incorrecta'); setScreen('pw'); }
      else { setError(e.message); setScreen('select'); }
    }
  }

  function go(){
    if(!sessionPassword) setScreen('pw');
    else doGen(sessionPassword);
  }

  function submitPw(){
    const pw=pwRef.current?.value?.trim();
    if(!pw) return;
    sessionPassword=pw; doGen(pw);
  }

  /* ── SELECT ── */
  if(screen==='select'||screen==='pw'){
    return html`
      <a class="back" href="index.html">← Inicio</a>
      <h1>Práctica de Enlace</h1>
      <p class="subtitle">Lectura en voz alta con fluidez natural</p>

      <div class="card">
        <h2>¿Qué es el enlace?</h2>
        <p>En español hablado, las palabras no se pronuncian por separado — se encadenan dentro de cada frase, creando un flujo continuo de sonido. Este fenómeno se llama <em>enlace</em> o <em>encadenamiento</em>.</p>

        <h3 style="margin-top:18px">Reglas de enlace</h3>
        <div style="margin-top:10px">
          <div class="rule-row">
            <div class="rule-dot" style="background:var(--link-cv)"></div>
            <div>
              <div class="rule-label">Consonante + Vocal</div>
              <div class="rule-example">La consonante final salta a la sílaba siguiente: "los ojos" → lo - so - jos</div>
            </div>
          </div>
          <div class="rule-row">
            <div class="rule-dot" style="background:var(--link-vv)"></div>
            <div>
              <div class="rule-label">Vocal + Vocal (sinalefa)</div>
              <div class="rule-example">Las vocales se funden en una sola sílaba: "mi amigo" → mia - mi - go</div>
            </div>
          </div>
          <div class="rule-row">
            <div class="rule-dot" style="background:var(--link-cc)"></div>
            <div>
              <div class="rule-label">Consonante + Misma consonante</div>
              <div class="rule-example">Se pronuncia una sola vez: "dos sillas" → do - si - llas</div>
            </div>
          </div>
        </div>

        <p style="margin-top:14px;font-size:0.88rem;color:var(--text-muted)">
          La <strong style="color:var(--text-secondary)">H</strong> es invisible — nunca bloquea el enlace: "mi hermano" → mier - ma - no
        </p>
        <p style="font-size:0.88rem;color:var(--text-muted)">
          La <strong style="color:var(--text-secondary)">Y</strong> funciona como consonante: "playa es" → enlace de consonante + vocal.
        </p>

        <div class="rule-section">
          <div class="rule-section-title">¿Cuándo NO se enlazan?</div>
          <div class="no-link-row">
            <span class="no-link-dot">✕</span>
            <span>Dos consonantes <em>diferentes</em>: "el gato" — la L y la G no se combinan</span>
          </div>
          <div class="no-link-row">
            <span class="no-link-dot">✕</span>
            <span>Vocal seguida de consonante: "va con" — la A y la C no se enlazan</span>
          </div>
          <div class="no-link-row">
            <span class="no-link-dot">✕</span>
            <span>Puntuación (comas, puntos, etc.) — pausa natural para respirar</span>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Generar texto</h2>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
          <span class="dialect-tag">${dialect==='rioplatense'?'Rioplatense (vos)':'Español neutro (tú)'}</span>
          <span style="font-size:0.78rem;color:var(--text-muted)">— se cambia desde la página principal</span>
        </div>

        <div class="field-label">Nivel</div>
        <div class="btn-row">
          ${['A2','B1','B2','C1'].map(l=>html`
            <button class="btn-opt ${level===l?'active':''}" onClick=${()=>setLevel(l)}>${l}</button>
          `)}
        </div>

        <div class="field-label">Tema</div>
        <div class="check-row">
          <input type="checkbox" id="thk" checked=${themeOpen}
            onChange=${e=>{setThemeOpen(e.target.checked);if(!e.target.checked)setTheme('');}} />
          <label for="thk">Elegir tema</label>
        </div>
        <input class="text-input" style="margin-bottom:18px"
          placeholder="Ej: viajes, comida, historia argentina…"
          value=${theme} onInput=${e=>setTheme(e.target.value)}
          disabled=${!themeOpen} />

        ${error && html`<div class="error-msg">${error}</div>`}

        ${screen==='pw' ? html`
          <div style="margin-bottom:14px">
            <div class="field-label">Contraseña</div>
            <div class="pw-row">
              <input class="pw-input" type="password" ref=${pwRef} placeholder="Contraseña"
                onKeyDown=${e=>{if(e.key==='Enter')submitPw()}} />
              <button class="pw-btn" onClick=${submitPw}>→</button>
            </div>
          </div>
        ` : html`
          <button class="btn-primary" onClick=${go}>Generar texto</button>
        `}
      </div>
    `;
  }

  /* ── LOADING ── */
  if(screen==='loading'){
    return html`
      <a class="back" href="index.html">← Inicio</a>
      <h1>Práctica de Enlace</h1>
      <div class="loading">
        <div class="spinner"></div>
        <div>Generando texto al nivel ${level}…</div>
      </div>
    `;
  }

  /* ── PASSAGE ── */
  const sentences = splitSentences(passage);

  return html`
    <a class="back" href="index.html">← Inicio</a>
    <h1>Práctica de Enlace</h1>
    <p class="subtitle">Lee en voz alta — sigue los enlaces entre palabras</p>

    <div class="passage-card">
      <div class="legend">
        <div class="legend-row">
          <div class="legend-swatch" style="background:var(--link-cv)"></div>
          <span class="legend-label">Consonante + vocal</span>
          <span class="legend-ex">los ojos → <b>lo - so - jos</b></span>
        </div>
        <div class="legend-row">
          <div class="legend-swatch" style="background:var(--link-vv)"></div>
          <span class="legend-label">Sinalefa (vocal + vocal)</span>
          <span class="legend-ex">mi amigo → <b>mia - mi - go</b></span>
        </div>
        <div class="legend-row">
          <div class="legend-swatch" style="background:var(--link-cc)"></div>
          <span class="legend-label">Consonante doble</span>
          <span class="legend-ex">dos sillas → <b>do - si - llas</b></span>
        </div>
      </div>

      <div class="rate-bar">
        <span class="rate-label">Velocidad 🔊</span>
        ${[['lento','Lento'],['normal','Normal'],['rapido','Rápido']].map(([k,lb])=>html`
          <button class="rate-btn ${rate===k?'active':''}" onClick=${()=>pickRate(k)}>${lb}</button>
        `)}
      </div>

      ${sentences.map((s,i)=>html`<${SentenceDisplay} text=${s} key=${i} />`)}
    </div>

    <div class="bottom-buttons">
      <button class="btn-primary" onClick=${()=>{setPassage('');setScreen('select');}}>← Nueva selección</button>
      <button class="btn-ghost" onClick=${()=>doGen(sessionPassword)}>Otra vez (mismo nivel)</button>
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
