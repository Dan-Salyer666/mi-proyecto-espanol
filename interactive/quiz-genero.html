<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario de Género</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg-deep:#0a1628; --bg-card:#111d35; --bg-card-hover:#162544; --bg-input:#0d1a2f;
  --border:#1e3355; --border-focus:#3b6cb5;
  --text-primary:#e2e8f0; --text-secondary:#8a9bb8; --text-muted:#5a6f8e;
  --accent:#4a90d9; --accent-glow:rgba(74,144,217,0.15);
  --ok:#34d399; --warn:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{font-family:'Outfit',sans-serif;background:var(--bg-deep);color:var(--text-primary);
  padding:32px 16px 80px;position:relative;overflow-x:hidden;line-height:1.5;}
body::before{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 60 60' fill='none' stroke='%234a90d9' stroke-width='0.8'><path d='M30,5 L35,25 L55,30 L35,35 L30,55 L25,35 L5,30 L25,25 Z'/><circle cx='30' cy='30' r='3'/></svg>");
  background-size:60px 60px;opacity:0.08;pointer-events:none;z-index:0;}
.container{max-width:760px;margin:0 auto;position:relative;z-index:1;}

.back-nav{display:inline-flex;align-items:center;gap:8px;color:var(--text-muted);text-decoration:none;
  font-size:0.9rem;padding:6px 0;margin-bottom:20px;transition:color 0.2s;}
.back-nav:hover{color:var(--accent);}

header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
.header-text h1{font-family:'DM Serif Display',serif;font-size:clamp(1.7rem,4.5vw,2.4rem);font-weight:normal;
  color:var(--text-primary);line-height:1.1;}
.header-text p{font-size:0.85rem;color:var(--text-muted);font-style:italic;margin-top:4px;}

/* Drive bar + dot + spinner (reused from Comprensión Lectora) */
.drive-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  padding:12px 16px;margin-bottom:18px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;}
.drive-status{display:flex;align-items:center;gap:10px;font-size:0.9rem;color:var(--text-secondary);}
.drive-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.drive-dot.connected{background:var(--ok);}
.drive-dot.disconnected{background:var(--text-muted);}
.drive-dot.busy{background:var(--warn);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.drive-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

.btn{font-family:'Outfit',sans-serif;font-weight:500;border-radius:8px;cursor:pointer;transition:all 0.2s;
  font-size:0.85rem;padding:7px 16px;border:1px solid var(--border);}
.btn-secondary{background:transparent;color:var(--text-secondary);}
.btn-secondary:hover{border-color:var(--border-focus);color:var(--text-primary);}
.btn-primary{background:var(--accent-glow);color:var(--accent);border-color:rgba(74,144,217,0.35);}
.btn-primary:hover{background:rgba(74,144,217,0.22);}
.btn:disabled{opacity:0.4;cursor:default;pointer-events:none;}

.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px 26px;margin-bottom:18px;}
.panel.muted{color:var(--text-muted);font-size:0.92rem;text-align:center;font-style:italic;}

.headline{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;margin-bottom:6px;}
.headline .big{font-family:'DM Serif Display',serif;font-size:2.6rem;line-height:1;color:var(--text-primary);}
.headline .big small{font-family:'Outfit',sans-serif;font-size:0.9rem;color:var(--text-muted);font-weight:400;margin-left:8px;}
.headline .hard{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--warn);}
.headline .hard small{font-family:'Outfit',sans-serif;font-size:0.82rem;color:var(--text-muted);font-weight:400;margin-left:6px;}

.modegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:18px;}
.modecell{background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.modecell .label{font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);}
.modecell .num{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text-primary);margin-top:2px;}
.modecell .note{font-size:0.72rem;color:var(--text-muted);font-style:italic;margin-top:2px;}

.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
.hidden{display:none!important;}
@media (max-width:600px){.panel{padding:20px 18px;}}
</style>
</head>
<body>
<div class="container">

  <a href="../index.html" class="back-nav">← Volver al menú</a>

  <header>
    <div class="header-text">
      <h1>Cuestionario de Género</h1>
      <p>Práctica de el / la / ambos · datos en Google Drive</p>
    </div>
    <div style="flex-shrink:0;padding-top:6px">
      <button id="headerDriveLabel" onclick="connectDriveInline()" style="font-family:'Outfit',sans-serif;font-size:0.72rem;font-weight:500;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:20px;cursor:pointer;white-space:nowrap;padding:5px 12px;transition:all 0.2s;display:flex;align-items:center;gap:6px">
        <span class="drive-dot disconnected" id="headerDriveDot" style="width:7px;height:7px"></span>Drive ✗
      </button>
    </div>
  </header>

  <!-- Drive status bar -->
  <div class="drive-bar">
    <div class="drive-status">
      <div class="drive-dot disconnected" id="driveDot"></div>
      <div class="drive-spinner hidden" id="driveSpinner"></div>
      <span id="driveLabel">Google Drive: no conectado</span>
    </div>
    <button class="btn btn-secondary" id="driveBtn" onclick="connectDrive()">Conectar Drive</button>
  </div>

  <!-- Pre-connect prompt -->
  <div class="panel muted" id="prePanel">
    Conecta Google Drive para cargar el conjunto de palabras.
  </div>

  <!-- Dataset status (shown once loaded) -->
  <div class="panel hidden" id="dataPanel">
    <div class="headline">
      <div class="big" id="countTotal">0<small>palabras</small></div>
      <div class="hard" id="countHard">0<small>difíciles</small></div>
    </div>
    <div style="font-size:0.85rem;color:var(--text-muted)">Conjunto cargado desde Drive · <span id="datasetVer"></span></div>

    <div class="modegrid" id="modeGrid"></div>

    <div class="controls">
      <button class="btn btn-secondary" id="reloadBtn" onclick="reloadFromDrive()">Recargar desde Drive</button>
      <button class="btn btn-secondary" id="disconnectBtn" onclick="disconnectDrive()">Desconectar</button>
    </div>
  </div>

</div>

// ═══════════════════════════════════════════════
//  DRIVE UI
// ═══════════════════════════════════════════════
function setDriveUI(state, label) {
  const dot=document.getElementById('driveDot'),
        spn=document.getElementById('driveSpinner'),
        lbl=document.getElementById('driveLabel'),
        btn=document.getElementById('driveBtn');
  const busy = state==='busy';
  if (dot){ dot.className='drive-dot '+state; dot.classList.toggle('hidden',busy); }
  if (spn){ spn.classList.toggle('hidden',!busy); }
  if (lbl) lbl.textContent=label;
  if (btn){ btn.textContent = state==='connected' ? 'Desconectar' : 'Conectar Drive';
            btn.onclick = state==='connected' ? disconnectDrive : connectDrive;
            btn.disabled = busy; }
  // header pill
  const hlbl=document.getElementById('headerDriveLabel');
  if (hlbl){
    const isConn=state==='connected', isBusy=busy;
    hlbl.innerHTML = `<span class="drive-dot ${state}" id="headerDriveDot" style="width:7px;height:7px"></span>${isConn?'Drive ✓':isBusy?'Drive…':'Drive ✗'}`;
    hlbl.style.color       = isConn?'var(--ok)':isBusy?'var(--warn)':'var(--text-muted)';
    hlbl.style.borderColor = isConn?'rgba(52,211,153,0.4)':isBusy?'rgba(251,191,36,0.3)':'var(--border)';
    hlbl.style.cursor      = isConn?'default':'pointer';
    hlbl.onclick           = isConn?()=>alert('Google Drive ya está conectado.'):connectDriveInline;
  }
  // lock dataset controls while busy
  ['reloadBtn','disconnectBtn'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=busy;});
}

function connectDriveInline(){
  if (!driveReady){ alert('La biblioteca de Google aún se está cargando.'); return; }
  if (driveToken){ alert('Google Drive ya está conectado.'); return; }
  connectDrive();
}

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
function initDriveAuth(){
  if (typeof google==='undefined' || !google.accounts){ setTimeout(initDriveAuth,300); return; }
  driveReady = true;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: DRIVE_SCOPE, callback: handleTokenResponse,
  });
}
function connectDrive(){
  if (!driveReady){ alert('La biblioteca de Google aún se está cargando. Inténtalo de nuevo.'); return; }
  setDriveUI('busy','Conectando…');
  tokenClient.requestAccessToken({ prompt:'' });
}
function disconnectDrive(){
  if (driveToken) google.accounts.oauth2.revoke(driveToken,()=>{});
  driveToken=null; folderId=null; datasetFileId=null; dataset=null;
  setDriveUI('disconnected','Google Drive: no conectado');
  document.getElementById('dataPanel').classList.add('hidden');
  document.getElementById('prePanel').classList.remove('hidden');
}
function connectDriveAsync(){
  return new Promise(resolve=>{
    if (!driveReady){ resolve(false); return; }
    _connectResolve = resolve;
    setDriveUI('busy','Reconectando Drive…');
    tokenClient.requestAccessToken({ prompt:'' });
  });
}
// Validate token; silently re-auth if expired (same behavior as the reader app)
async function ensureDriveConnection(){
  if (!driveToken) return await connectDriveAsync();
  try{
    const res = await fetch('https://www.googleapis.com/drive/v3/about?fields=user',
      { headers:{ 'Authorization':'Bearer '+driveToken } });
    if (res.ok) return true;
    if (res.status===401){ driveToken=null; return await connectDriveAsync(); }
    return false;
  }catch(e){ console.error('Drive validation error:',e); return false; }
}
async function handleTokenResponse(resp){
  if (resp.error){
    setDriveUI('disconnected','Error al conectar Drive');
    if (_connectResolve){ const r=_connectResolve; _connectResolve=null; r(false); }
    return;
  }
  driveToken = resp.access_token;
  setDriveUI('busy','Verificando carpeta…');
  try{
    folderId = await ensureFolder();
    setDriveUI('busy','Cargando palabras…');
    await loadDataset();
    setDriveUI('connected','Google Drive: conectado ✓');
    renderStatus();
    if (_connectResolve){ const r=_connectResolve; _connectResolve=null; r(true); }
  }catch(e){
    console.error('Drive setup error:',e);
    setDriveUI('disconnected','Error al acceder a Drive');
    if (_connectResolve){ const r=_connectResolve; _connectResolve=null; r(false); }
  }
}

// ═══════════════════════════════════════════════
//  DRIVE REQUEST + FOLDER MANAGEMENT
// ═══════════════════════════════════════════════
async function driveRequest(url, options={}){
  const res = await fetch(url, { ...options,
    headers:{ 'Authorization':'Bearer '+driveToken, 'Content-Type':'application/json', ...(options.headers||{}) } });
  if (res.status===401){ driveToken=null; setDriveUI('disconnected','Sesión Drive expirada — reconecta'); throw new Error('Drive token expired'); }
  return res;
}
async function findFolder(name, parentId){
  const q = parentId
    ? `name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`
    : `name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  const res = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  const data = await res.json();
  return data.files?.length>0 ? data.files[0].id : null;
}
async function createFolder(name, parentId){
  const body={ name, mimeType:'application/vnd.google-apps.folder' };
  if (parentId) body.parents=[parentId];
  const res = await driveRequest('https://www.googleapis.com/drive/v3/files',{ method:'POST', body:JSON.stringify(body) });
  return (await res.json()).id;
}
async function ensureFolder(){
  let p = await findFolder(PARENT_FOLDER,null); if (!p) p = await createFolder(PARENT_FOLDER,null);
  let g = await findFolder(GENERO_FOLDER,p);   if (!g) g = await createFolder(GENERO_FOLDER,p);
  return g;
}

//  DATASET — find or create, read, (re)load
// ═══════════════════════════════════════════════
async function findDatasetFile(){
  const q = `name='${DATASET_NAME}' and '${folderId}' in parents and trashed=false`;
  const res = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc`);
  const data = await res.json();
  return data.files?.length>0 ? data.files[0].id : null;
}
async function readDatasetFile(id){
  const res = await driveRequest(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
  return await res.json();
}
async function createDatasetFile(obj){
  const boundary='-------314159265358979323846';
  const body=[
    `--${boundary}`,'Content-Type: application/json; charset=UTF-8','',
    JSON.stringify({ name:DATASET_NAME, parents:[folderId] }),
    `--${boundary}`,'Content-Type: application/json','',
    JSON.stringify(obj),`--${boundary}--`,
  ].join('\r\n');
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',
    headers:{ 'Authorization':'Bearer '+driveToken, 'Content-Type':`multipart/related; boundary="${boundary}"` },
    body,
  });
  if (!res.ok) throw new Error('No se pudo crear el archivo de datos en Drive');
  return (await res.json()).id;
}
// Find the dataset; if absent, bootstrap it from the embedded seed.
async function loadDataset(){
  datasetFileId = await findDatasetFile();
  if (datasetFileId){
    dataset = await readDatasetFile(datasetFileId);
  } else {
    // First run on this account — create the file from the embedded seed.
    dataset = JSON.parse(JSON.stringify(SEED_DATA));
    datasetFileId = await createDatasetFile(dataset);
  }
  if (!dataset || !Array.isArray(dataset.words)) throw new Error('Datos de género inválidos');
}
async function reloadFromDrive(){
  const ok = await ensureDriveConnection();
  if (!ok){ setDriveUI('disconnected','No se pudo reconectar con Drive'); return; }
  setDriveUI('busy','Recargando…');
  try{
    folderId = await ensureFolder();
    await loadDataset();
    setDriveUI('connected','Google Drive: conectado ✓');
    renderStatus();
  }catch(e){
    console.error('Reload error:',e);
    setDriveUI('connected','Google Drive: conectado ✓');
    alert('No se pudo recargar el conjunto desde Drive.');
  }
}

// ═══════════════════════════════════════════════
//  STATUS READOUT (Phase 3 sanity check — no quiz logic yet)
// ═══════════════════════════════════════════════
function renderStatus(){
  const w = dataset.words;
  const isAmbos = x => x.articulo==='ambos';
  const hasTag  = (x,t) => Array.isArray(x.tags) && x.tags.includes(t);
  const removable = x => (x.articulo==='el'||x.articulo==='la') && !x.contexto && (!x.tags||x.tags.length===0);
  const follower  = x => (x.articulo==='el'||x.articulo==='la') && !hasTag(x,'excepcion') && !hasTag(x,'el-agua');

  const total   = w.length;
  const hard    = w.filter(x=>x.dificultad==='dificil').length;
  document.getElementById('countTotal').innerHTML = total + '<small>palabras</small>';
  document.getElementById('countHard').innerHTML  = hard  + '<small>difíciles</small>';
  document.getElementById('datasetVer').textContent =
    `esquema v${dataset.schemaVersion ?? '?'} · actualizado ${dataset.updated ?? '—'}`;

  const modes = [
    ['Sin filtro',  total,                                   ''],
    ['Difíciles',   hard,                                    hard===0?'vacío al inicio':''],
    ['Ambos',       w.filter(isAmbos).length,                ''],
    ['-ma',         w.filter(x=>hasTag(x,'ma')).length,      ''],
    ['Excepciones', w.filter(x=>hasTag(x,'excepcion')).length, 'mezcla 50/50 con reglas'],
    ['El agua',     w.filter(x=>hasTag(x,'el-agua')).length, 'soporta 10 y 20'],
    ['Seguidoras',  w.filter(follower).length,               'banco de reglas'],
    ['Eliminables', w.filter(removable).length,              'fluff + añadidas'],
  ];
  const grid = document.getElementById('modeGrid');
  grid.innerHTML = modes.map(([label,num,note])=>`
    <div class="modecell">
      <div class="label">${label}</div>
      <div class="num">${num}</div>
      ${note?`<div class="note">${note}</div>`:''}
    </div>`).join('');

  document.getElementById('prePanel').classList.add('hidden');
  document.getElementById('dataPanel').classList.remove('hidden');
}

window.addEventListener('load', initDriveAuth);
